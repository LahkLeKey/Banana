schema_version: "1.0"
workflow:
  id: "drift-realignment"
  name: "Drift Realignment Cycle"
  version: "1.0.0"
  author: "Banana"
  description: "Runs specify -> plan -> tasks with explicit drift-alignment gates rooted in .specify"

requires:
  speckit_version: ">=0.7.2"
  integrations:
    any: ["copilot", "claude", "gemini"]

inputs:
  spec:
    type: string
    required: true
    prompt: "Describe the scope to realign"
  integration:
    type: string
    default: "copilot"
    prompt: "Integration to use (e.g. copilot, claude, gemini)"

steps:
  - id: specify
    command: speckit.specify
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: scope-enforcement
    type: gate
    message: "Run `bash .specify/scripts/bash/validate-spec-boundaries.sh` and approve only when generated spec has explicit and non-empty in-scope, out-of-scope, and assumptions sections."
    options: [approve, reject]
    on_reject: abort

  - id: plan
    command: speckit.plan
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: review-plan-traceability
    type: gate
    message: "Confirm plan preserves story-to-requirement traceability and ownership lanes."
    options: [approve, reject]
    on_reject: abort

  - id: tasks
    command: speckit.tasks
    integration: "{{ inputs.integration }}"
    input:
      args: "{{ inputs.spec }}"

  - id: traceability-gate
    type: gate
    message: "Run `bash .specify/scripts/bash/validate-task-traceability.sh` and approve only when tasks are traceable (or drift findings are explicitly categorized)."
    options: [approve, reject]
    on_reject: abort

  - id: record-realignment-decisions
    type: gate
    message: "For each defer/split/reject drift finding, record a decision using `bash .specify/scripts/bash/record-realignment-decision.sh ...` and approve only when the decision log is updated."
    options: [approve, reject]
    on_reject: abort

  - id: review-wiki-freeze
    type: gate
    message: "Confirm .wiki markdown pages match .specify/wiki/human-reference-allowlist.txt and canonical mirror parity remains intact."
    options: [approve, reject]
    on_reject: abort
