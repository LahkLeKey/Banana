name: Human Intake - React UI Agent
description: Route React UI/state/flow issues to react-ui-agent triage automation.
title: "[react-ui-agent] "
labels:
  - triage-idea
  - automation
body:
  - type: markdown
    attributes:
      value: |
        <!-- banana-intake-source: human -->
        <!-- banana-target-agent: react-ui-agent -->
        Human-authored issue intake for react-ui-agent.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: Describe the user-facing bug in React UI.
      placeholder: On the settings screen, selecting... causes...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: Describe expected UI behavior.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence or reproduction
      description: Include browser/device details, logs, and screenshots.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List concrete checks that define done.
    validations:
      required: true
