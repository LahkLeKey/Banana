name: Human Intake - Mobile Runtime Agent
description: Route Android emulator or iOS preview runtime issues to mobile-runtime-agent triage automation.
title: "[mobile-runtime-agent] "
labels:
  - triage-idea
  - automation
body:
  - type: markdown
    attributes:
      value: |
        <!-- banana-intake-source: human -->
        <!-- banana-target-agent: mobile-runtime-agent -->
        Human-authored issue intake for mobile-runtime-agent.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: Describe Android/iOS preview runtime issue.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: Describe expected mobile runtime behavior.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence or reproduction
      description: Include WSL distro, runtime mode, and logs/screenshots.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List concrete checks that define done.
    validations:
      required: true
