name: Human Intake - API Pipeline Agent
description: Route an ASP.NET controller/service/pipeline issue to api-pipeline-agent triage automation.
title: "[api-pipeline-agent] "
labels:
  - triage-idea
  - automation
body:
  - type: markdown
    attributes:
      value: |
        <!-- banana-intake-source: human -->
        <!-- banana-target-agent: api-pipeline-agent -->
        Human-authored issue intake for api-pipeline-agent.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: Describe the current behavior and why it is incorrect.
      placeholder: The API returns an incorrect response when...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: Describe the correct behavior.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence or reproduction
      description: Include steps, logs, request payloads, or screenshots.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List concrete checks that define done.
      placeholder: |
        - Endpoint returns expected status code
        - Existing tests pass
        - New coverage added for regression
    validations:
      required: true
