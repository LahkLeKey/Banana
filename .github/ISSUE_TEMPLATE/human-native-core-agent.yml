name: Human Intake - Native Core Agent
description: Route native core behavior issues to native-core-agent triage automation.
title: "[native-core-agent] "
labels:
  - triage-idea
  - automation
body:
  - type: markdown
    attributes:
      value: |
        <!-- banana-intake-source: human -->
        <!-- banana-target-agent: native-core-agent -->
        Human-authored issue intake for native-core-agent.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: Describe the native core bug or regression.
      placeholder: Core domain output is incorrect when...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: Describe expected native-core output/behavior.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence or reproduction
      description: Include failing input/output, tests, or traces.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List concrete checks that define done.
    validations:
      required: true
