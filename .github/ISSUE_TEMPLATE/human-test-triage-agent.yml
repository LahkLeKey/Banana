name: Human Intake - Test Triage Agent
description: Route failing test or coverage regressions to test-triage-agent triage automation.
title: "[test-triage-agent] "
labels:
  - triage-idea
  - automation
body:
  - type: markdown
    attributes:
      value: |
        <!-- banana-intake-source: human -->
        <!-- banana-target-agent: test-triage-agent -->
        Human-authored issue intake for test-triage-agent.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: Describe failing tests or coverage regressions.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: Describe expected test outcomes.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence or reproduction
      description: Include failing test names, commands, and logs.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List concrete checks that define done.
    validations:
      required: true
