name: Human Intake - Native Wrapper Agent
description: Route ABI/export/status-code contract issues to native-wrapper-agent triage automation.
title: "[native-wrapper-agent] "
labels:
  - triage-idea
  - automation
body:
  - type: markdown
    attributes:
      value: |
        <!-- banana-intake-source: human -->
        <!-- banana-target-agent: native-wrapper-agent -->
        Human-authored issue intake for native-wrapper-agent.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: Describe the wrapper ABI or export problem.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: Describe expected wrapper behavior.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence or reproduction
      description: Include API calls, status codes, and crash logs when available.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List concrete checks that define done.
    validations:
      required: true
