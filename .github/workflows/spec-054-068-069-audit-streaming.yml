name: "spec-054-068-069: SSE streaming, rate-limiting & audit log"

on:
  push:
    branches:
      - sprint3-054-068-069
  pull_request:
    branches:
      - main
    paths:
      - "src/typescript/api/**"
      - "src/c-sharp/asp.net/**"
      - "src/typescript/react/src/lib/hooks/useVerdictStream.ts"
      - ".github/workflows/spec-054-068-069-audit-streaming.yml"

jobs:
  ts-api-build:
    name: "TS API — install & typecheck"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/typescript/api
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Prisma generate (schema validation)
        run: bunx prisma generate --schema prisma/schema.prisma

      - name: Typecheck
        run: bun run build

  aspnet-build:
    name: "ASP.NET — build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/c-sharp/asp.net
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore Banana.Api.csproj

      - name: Build
        run: dotnet build Banana.Api.csproj --no-restore --configuration Release

  aspnet-unit-tests:
    name: "ASP.NET — unit tests"
    runs-on: ubuntu-latest
    needs: aspnet-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Test
        working-directory: tests/unit
        run: dotnet test --no-build --configuration Release || dotnet test --configuration Release
