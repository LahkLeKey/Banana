name: Orchestrate Banana SDLC

permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: write

on:
  workflow_dispatch:
    inputs:
      sdlc_id:
        description: SDLC orchestration identifier used as incremental PR prefix
        required: false
        default: "banana-sdlc"
      incremental_plan_json:
        description: 'Optional JSON array (or {"increments": [...]}) describing incremental PR slices'
        required: false
        default: ""
      base_branch:
        description: Base branch used for generated incremental pull requests
        required: false
        default: "main"
      allow_actions_actor:
        description: Allow workflow_dispatch runs triggered by github-actions[bot]
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      sdlc_mode:
        description: SDLC run mode (`incremental` default or `spec-drain`)
        required: false
        default: "incremental"
        type: choice
        options:
          - "incremental"
          - "spec-drain"
      enable_auto_merge:
        description: Enable auto-merge for generated PRs
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      auto_merge_method:
        description: Auto-merge method (squash, merge, rebase)
        required: false
        default: "squash"
        type: choice
        options:
          - "squash"
          - "merge"
          - "rebase"
      auto_debug_ci:
        description: In spec-drain mode, inspect failed CI runs and scaffold follow-up specs
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      ci_idea_budget:
        description: Maximum number of autonomous CI follow-up specs to scaffold per run
        required: false
        default: "3"
      sync_wiki:
        description: Run wiki synchronization layer after incremental PR orchestration
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  schedule:
    - cron: "0 4 * * 1-5"

jobs:
  orchestrate-sdlc:
    if: ${{ github.event_name == 'schedule' || github.actor != 'github-actions[bot]' || (github.event_name == 'workflow_dispatch' && github.event.inputs.allow_actions_actor == 'true') }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BANANA_REQUIRED_HUMAN_REVIEWER: LahkLeKey
      BANANA_SDLC_ID: ${{ github.event.inputs.sdlc_id || 'banana-sdlc' }}
      BANANA_SDLC_MODE: ${{ github.event.inputs.sdlc_mode || 'incremental' }}
      BANANA_AUTONOMY_STOP: ${{ github.event.inputs.autonomy_stop || 'false' }}
      BANANA_SDLC_DRAIN_STATE_PATH: ${{ github.event.inputs.spec_drain_state_path || '' }}
      BANANA_ENABLE_AUTO_MERGE: ${{ github.event.inputs.enable_auto_merge || 'true' }}
      BANANA_AUTO_MERGE_METHOD: ${{ github.event.inputs.auto_merge_method || 'squash' }}
      BANANA_SDLC_AUTO_DEBUG_CI: ${{ github.event.inputs.auto_debug_ci || 'true' }}
      BANANA_SDLC_AUTO_SCAFFOLD_SPECS: ${{ github.event.inputs.auto_debug_ci || 'true' }}
      BANANA_SDLC_CI_IDEA_BUDGET: ${{ github.event.inputs.ci_idea_budget || '3' }}
      BANANA_SDLC_CI_OPEN_ISSUES: ${{ github.event.inputs.open_ci_issues || 'true' }}
      BANANA_SDLC_CI_ISSUE_LABELS: "${{ github.event.inputs.ci_issue_labels || 'automation,ci,triage,agent:workflow-agent' }}"
      BANANA_SDLC_CI_ISSUE_TITLE_PREFIX: ${{ github.event.inputs.ci_issue_title_prefix || 'CI Auto-Debug' }}
      BANANA_SDLC_CI_LOG_EXCERPT_LINES: ${{ github.event.inputs.ci_log_excerpt_lines || '120' }}
      BANANA_SDLC_INCREMENT_PLAN_JSON: ${{ github.event.inputs.incremental_plan_json || '' }}
      BANANA_BASE_BRANCH: ${{ github.event.inputs.base_branch || 'main' }}
      BANANA_BRANCH_PREFIX: ${{ github.event.inputs.branch_prefix || 'sdlc' }}
      BANANA_DRAFT_PR: ${{ github.event.inputs.draft_pr || 'true' }}
      BANANA_PR_LABELS: "${{ github.event.inputs.labels || 'automation,sdlc,triaged-item,requires-human-approval,copilot-auto-approve,speckit-driven,agent:workflow-agent' }}"
      BANANA_PR_REVIEWERS: ${{ github.event.inputs.reviewers || '' }}
      BANANA_SDLC_SKIP_NO_CHANGES: ${{ github.event.inputs.skip_no_changes || 'true' }}
      BANANA_SDLC_CONTINUE_ON_ERROR: ${{ github.event.inputs.continue_on_error || 'false' }}
      BANANA_SDLC_REQUIRE_REAL_UPDATES: ${{ github.event.inputs.require_real_updates || 'true' }}
      BANANA_SDLC_SKIP_NON_REAL_UPDATES: ${{ github.event.inputs.skip_non_real_updates || 'true' }}
      BANANA_REAL_UPDATE_PATH_PATTERNS: ${{ github.event.inputs.real_update_path_patterns || 'src/**,tests/**,scripts/**,.github/workflows/**,docker/**,docker-compose.yml,CMakeLists.txt,Directory.Build.props' }}
      BANANA_SDLC_ENABLE_WIKI_SYNC: ${{ github.event.inputs.sync_wiki || 'true' }}
      BANANA_SDLC_VALIDATE_AI_CONTRACTS: ${{ github.event.inputs.validate_ai_contracts || 'true' }}
      BANANA_WIKI_DRY_RUN: ${{ github.event.inputs.wiki_dry_run || 'false' }}
      BANANA_WIKI_PUSH: ${{ github.event.inputs.wiki_push || 'true' }}
      BANANA_WIKI_STRICT: ${{ github.event_name == 'schedule' && 'true' || github.event.inputs.wiki_strict || 'false' }}
      BANANA_WIKI_COMMIT_MESSAGE: "${{ github.event.inputs.wiki_commit_message || 'docs(wiki): sync automated SDLC documentation snapshots' }}"
      BANANA_WIKI_REMOTE_URL: "${{ github.event.inputs.wiki_remote_url || 'https://github.com/LahkLeKey/Banana.wiki.git' }}"
      BANANA_ENFORCE_CANONICAL_WIKI_REMOTE: 'true'
      BANANA_WIKI_SYNC_MAPPING: ${{ github.event.inputs.wiki_sync_mapping || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Orchestrate incremental SDLC pull requests and wiki sync
        run: |
          bash scripts/workflow-orchestrate-sdlc.sh
