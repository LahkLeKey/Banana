name: Orchestrate Triage Idea Cloud

permissions:
  actions: write
  contents: write
  issues: write
  pull-requests: write

on:
  workflow_dispatch:
    inputs:
      idea:
        description: Idea text for a new triage issue (optional when issue_number is provided)
        required: false
        default: ""
      issue_number:
        description: Existing issue number to triage instead of creating a new issue
        required: false
        default: ""
      issue_labels:
        description: Comma-separated labels to apply when creating a triage issue via workflow_dispatch
        required: false
        default: "triage-idea,copilot-suggestion,ai-generated,automation,speckit-driven"
      pr_labels:
        description: Comma-separated labels for generated pull request
        required: false
        default: "automation,triaged-item,copilot-auto-approve,copilot-autonomous-cycle,speckit-driven,agent:workflow-agent"
      base_branch:
        description: Base branch that receives generated pull request
        required: false
        default: "main"
      branch_prefix:
        description: Prefix for generated automation branch
        required: false
        default: "triage"
      draft_pr:
        description: Open generated pull request as draft
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      clear_backlog:
        description: Close backlog triage issues and pull requests before creating new ones
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      backlog_issue_labels:
        description: Comma-separated issue labels used to select backlog issues for cleanup
        required: false
        default: "copilot-suggestion,ai-generated"
      backlog_pr_labels:
        description: Comma-separated PR labels used to select backlog pull requests for cleanup
        required: false
        default: "automation,triaged-item"
      backlog_pr_branch_prefixes:
        description: Comma-separated branch prefixes considered triage backlog candidates
        required: false
        default: "triage/,triage-copilot/,triage-feedback/"
      dispatch_required_checks:
        description: Dispatch required PR gate workflows for bot-authored triage PRs
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      check_workflows:
        description: Comma-separated workflow files to dispatch for PR gate checks
        required: false
        default: "copilot-review-triage.yml,require-human-approval.yml"
      epic_decomposition:
        description: Decompose epic-like triage ideas into linked user stories and tasks
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      epic_auto_dispatch_first_task:
        description: Dispatch triage automation for the first generated epic task
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      reviewers:
        description: Optional reviewer usernames as comma-separated values or [array] syntax
        required: false
        default: ""
      skip_if_no_changes:
        description: Skip PR creation when triage intake file has no effective changes
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      sync_wiki:
        description: Run wiki synchronization after triage orchestration
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      wiki_dry_run:
        description: Run wiki synchronization in dry-run mode
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      wiki_push:
        description: Push wiki commits to remote when wiki sync is not dry-run
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      wiki_strict:
        description: Fail workflow when wiki repository cannot be cloned or pushed
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      wiki_commit_message:
        description: Commit message used for wiki synchronization commits
        required: false
        default: "docs(wiki): sync automated SDLC documentation snapshots"
      wiki_remote_url:
        description: Optional explicit wiki git remote URL
        required: false
        default: "https://github.com/LahkLeKey/Banana.wiki.git"
  issues:
    types:
      - opened
      - labeled

jobs:
  orchestrate-triage-idea:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'issues' && ((github.event.action == 'opened' && (contains(github.event.issue.labels.*.name, 'triage-idea') || contains(github.event.issue.labels.*.name, 'copilot-suggestion') || contains(github.event.issue.labels.*.name, 'human-triage'))) || (github.event.action == 'labeled' && (github.event.label.name == 'triage-idea' || github.event.label.name == 'copilot-suggestion' || github.event.label.name == 'human-triage')))) }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BANANA_REQUIRED_HUMAN_REVIEWER: LahkLeKey
      BANANA_TRIAGE_IDEA: ${{ github.event.inputs.idea || '' }}
      BANANA_TRIAGE_ISSUE_NUMBER: ${{ github.event_name == 'issues' && github.event.issue.number || github.event.inputs.issue_number || '' }}
      BANANA_TRIAGE_ISSUE_LABELS: ${{ github.event_name == 'issues' && join(github.event.issue.labels.*.name, ',') || github.event.inputs.issue_labels || 'triage-idea,copilot-suggestion,ai-generated,automation,speckit-driven' }}
      BANANA_TRIAGE_PR_LABELS: "${{ github.event.inputs.pr_labels || 'automation,triaged-item,copilot-auto-approve,copilot-autonomous-cycle,speckit-driven,agent:workflow-agent' }}"
      BANANA_BASE_BRANCH: ${{ github.event.inputs.base_branch || 'main' }}
      BANANA_BRANCH_PREFIX: ${{ github.event.inputs.branch_prefix || 'triage' }}
      BANANA_DRAFT_PR: ${{ github.event.inputs.draft_pr || 'false' }}
      BANANA_TRIAGE_CLEAR_BACKLOG: ${{ github.event.inputs.clear_backlog || 'true' }}
      BANANA_TRIAGE_BACKLOG_ISSUE_LABELS: ${{ github.event.inputs.backlog_issue_labels || 'copilot-suggestion,ai-generated' }}
      BANANA_TRIAGE_BACKLOG_PR_LABELS: ${{ github.event.inputs.backlog_pr_labels || 'automation,triaged-item' }}
      BANANA_TRIAGE_BACKLOG_PR_BRANCH_PREFIXES: ${{ github.event.inputs.backlog_pr_branch_prefixes || 'triage/,triage-copilot/,triage-feedback/' }}
      BANANA_TRIAGE_DISPATCH_REQUIRED_CHECKS: ${{ github.event.inputs.dispatch_required_checks || 'true' }}
      BANANA_TRIAGE_CHECK_WORKFLOWS: ${{ github.event.inputs.check_workflows || 'copilot-review-triage.yml,require-human-approval.yml' }}
      BANANA_TRIAGE_ENABLE_EPIC_DECOMPOSITION: ${{ github.event.inputs.epic_decomposition || 'true' }}
      BANANA_TRIAGE_EPIC_AUTO_DISPATCH_FIRST_TASK: ${{ github.event.inputs.epic_auto_dispatch_first_task || 'true' }}
      BANANA_PR_REVIEWERS: ${{ github.event.inputs.reviewers || '' }}
      BANANA_SKIP_IF_NO_CHANGES: ${{ github.event.inputs.skip_if_no_changes || 'true' }}
      BANANA_SYNC_WIKI: ${{ github.event.inputs.sync_wiki || 'true' }}
      BANANA_WIKI_DRY_RUN: ${{ github.event.inputs.wiki_dry_run || 'false' }}
      BANANA_WIKI_PUSH: ${{ github.event.inputs.wiki_push || 'true' }}
      BANANA_WIKI_STRICT: ${{ github.event.inputs.wiki_strict || 'false' }}
      BANANA_WIKI_COMMIT_MESSAGE: "${{ github.event.inputs.wiki_commit_message || 'docs(wiki): sync automated SDLC documentation snapshots' }}"
      BANANA_WIKI_REMOTE_URL: "${{ github.event.inputs.wiki_remote_url || 'https://github.com/LahkLeKey/Banana.wiki.git' }}"
      BANANA_ENFORCE_CANONICAL_WIKI_REMOTE: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Orchestrate issue intake and triaged PR
        run: bash scripts/workflow-triage-idea-cloud.sh

      - name: Sync wiki snapshots for triage idea automation
        if: ${{ env.BANANA_SYNC_WIKI != 'false' }}
        run: bash scripts/workflow-sync-wiki.sh
