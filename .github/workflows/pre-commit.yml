name: Monorepo

# Single orchestrator for all monorepo PR / push validation. Renders the
# underlying lanes as a single workflow run with a single terminal pass/fail
# gate instead of dozens of separate runs.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  actions: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- Stage 1: fast lint / static guards (parallel) ---
  pre-commit:
    name: Lint / pre-commit
    uses: ./.github/workflows/pre-commit-reusable.yml

  ai-contract-guard:
    name: Lint / AI contract guard
    uses: ./.github/workflows/ai-contract-guard.yml

  spec-parity:
    name: Lint / spec ↔ tasks parity
    uses: ./.github/workflows/validate-spec-tasks-parity.yml

  wiki-lint:
    name: Lint / wiki
    uses: ./.github/workflows/wiki-lint.yml

  helm-lint:
    name: Lint / helm charts
    uses: ./.github/workflows/helm-lint.yml

  migration-discipline:
    name: Lint / migration discipline
    uses: ./.github/workflows/migration-discipline.yml

  # --- Stage 2: typecheck / build ---
  turbo:
    name: Build / turbo (typecheck + lint)
    needs: pre-commit
    uses: ./.github/workflows/turbo-ci.yml

  # --- Stage 3: native test matrix (parallel after lint) ---
  native-abi:
    name: Native / ABI check
    needs: pre-commit
    uses: ./.github/workflows/native-abi-check.yml

  native-cross-platform:
    name: Native / cross-platform
    needs: pre-commit
    uses: ./.github/workflows/native-cross-platform.yml

  native-sanitizers:
    name: Native / sanitizers
    needs: pre-commit
    uses: ./.github/workflows/native-sanitizers.yml

  # --- Stage 4: integration / runtime (after build) ---
  compose:
    name: Runtime / compose
    needs: [turbo, native-abi]
    uses: ./.github/workflows/compose-ci.yml
    secrets: inherit

  screenshot:
    name: Runtime / screenshot
    needs: turbo
    uses: ./.github/workflows/screenshot-ci.yml
    secrets: inherit

  web-vitals:
    name: Runtime / web vitals budget
    needs: turbo
    uses: ./.github/workflows/web-vitals-budget.yml

  # --- Final summary gate ---
  monorepo-pass-fail:
    name: Monorepo / Pass-Fail
    needs:
      - pre-commit
      - ai-contract-guard
      - spec-parity
      - wiki-lint
      - helm-lint
      - migration-discipline
      - turbo
      - native-abi
      - native-cross-platform
      - native-sanitizers
      - compose
      - screenshot
      - web-vitals
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Publish monorepo summary
        run: |
          {
            echo "## Monorepo Summary"
            echo
            echo "| Lane | Result |"
            echo "| --- | --- |"
            echo "| Lint / pre-commit | ${{ needs.pre-commit.result }} |"
            echo "| Lint / AI contract guard | ${{ needs.ai-contract-guard.result }} |"
            echo "| Lint / spec parity | ${{ needs.spec-parity.result }} |"
            echo "| Lint / wiki | ${{ needs.wiki-lint.result }} |"
            echo "| Lint / helm charts | ${{ needs.helm-lint.result }} |"
            echo "| Lint / migration discipline | ${{ needs.migration-discipline.result }} |"
            echo "| Build / turbo | ${{ needs.turbo.result }} |"
            echo "| Native / ABI check | ${{ needs.native-abi.result }} |"
            echo "| Native / cross-platform | ${{ needs.native-cross-platform.result }} |"
            echo "| Native / sanitizers | ${{ needs.native-sanitizers.result }} |"
            echo "| Runtime / compose | ${{ needs.compose.result }} |"
            echo "| Runtime / screenshot | ${{ needs.screenshot.result }} |"
            echo "| Runtime / web vitals budget | ${{ needs.web-vitals.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Verify all upstream jobs succeeded
        run: |
          echo "Monorepo result: ${{ contains(needs.*.result, 'failure') && 'FAILURE' || contains(needs.*.result, 'cancelled') && 'CANCELLED' || 'SUCCESS' }}"
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            exit 1
          fi
