name: Monorepo

# Single orchestrator for all monorepo PR / push validation. Renders the
# underlying lanes as a single workflow run with a single terminal pass/fail
# gate instead of dozens of separate runs.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  actions: read

env:
  BANANA_CI_ARTIFACT_ROOT: .artifacts/compose-ci
  BANANA_COVERAGE_ARTIFACT_ROOT: .artifacts/coverage
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # --- Stage 1: fast lint / static guards (parallel) ---
  pre-commit:
    name: Lint / pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - name: Install clang-format
        run: sudo apt-get update -qq && sudo apt-get install -y clang-format-19

      - name: Install pre-commit
        run: python -m pip install pre-commit

      - name: Run pre-commit on PR diff
        if: github.event_name == 'pull_request'
        run: |
          pre-commit run --show-diff-on-failure --color=always \
            --from-ref "${{ github.event.pull_request.base.sha }}" \
            --to-ref "${{ github.event.pull_request.head.sha }}"

      - name: Run pre-commit on all files
        if: github.event_name != 'pull_request'
        run: pre-commit run --show-diff-on-failure --color=always --all-files
        env:
          SKIP: dotnet-format

  ai-contract-guard:
    name: Lint / AI contract guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate AI contracts and terminology guard
        run: python .specify/scripts/validate-ai-contracts.py
      - name: Validate workflow orchestrator dependencies
        run: bash scripts/validate-workflow-dependencies.sh
      - name: Smoke test spec-driven agent attribution
        run: bash scripts/smoke-test-spec-driven-agents.sh

  spec-parity:
    name: Lint / spec ↔ tasks parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pytest
        run: pip install --quiet pytest
      - name: Run parser unit tests
        run: python -m pytest tests/scripts/test_validate_spec_tasks_parity.py -v
      - name: Lint all feature directories
        run: python scripts/validate-spec-tasks-parity.py --all

  wiki-lint:
    name: Lint / wiki
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate AI contracts (wiki allowlist + mirror)
        run: python scripts/validate-ai-contracts.py
      - name: Validate wiki-scaffold consistency
        run: bash scripts/wiki-scaffold.sh --dry-run --validate

  helm-lint:
    name: Lint / helm charts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.14.0'
      - name: Add Bitnami repo
        run: helm repo add bitnami https://charts.bitnami.com/bitnami && helm repo update
      - name: Lint chart
        run: helm lint helm/banana --strict
      - name: Template render check
        run: helm template banana helm/banana --debug > /dev/null

  migration-discipline:
    name: Lint / migration discipline
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: banana
          POSTGRES_PASSWORD: banana
          POSTGRES_DB: banana
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: src/typescript/api
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Apply committed migrations
        env:
          DATABASE_URL: postgresql://banana:banana@localhost:5432/banana
        run: bunx prisma migrate deploy --schema prisma/schema.prisma
      - name: Check for schema drift
        env:
          DATABASE_URL: postgresql://banana:banana@localhost:5432/banana
        run: |
          STATUS=$(bunx prisma migrate status --schema prisma/schema.prisma 2>&1 || true)
          echo "$STATUS"
          if echo "$STATUS" | grep -q "following migration(s) have not yet been applied"; then
            echo "::error::Schema drift detected: schema.prisma has uncommitted changes."
            exit 1
          fi
      - name: Verify schema is valid
        env:
          DATABASE_URL: postgresql://banana:banana@localhost:5432/banana
        run: bunx prisma validate --schema prisma/schema.prisma

  # --- Stage 2: typecheck / build ---
  turbo:
    name: Build / turbo (typecheck + lint)
    needs: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bunx turbo typecheck lint --filter='./src/typescript/...'
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: ${{ runner.os }}-turbo-

  # --- Stage 3: native test matrix (parallel after lint) ---
  native-abi:
    name: Native / ABI check
    needs: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends cmake gcc binutils ninja-build clang
      - name: Build native library
        run: |
          cmake --preset default -DCMAKE_BUILD_TYPE=Release
          cmake --build build/cmake-tools --target banana_native
      - name: ABI symbol diff
        run: bash scripts/check-native-abi-symbols.sh build/cmake-tools/libbanana_native.so
      - name: Run ABI version test
        run: |
          cmake --build build/cmake-tools --target banana_test_abi_version
          cd build/cmake-tools && ctest -R banana_test_abi_version --output-on-failure

  native-cross-platform:
    name: Native / cross-platform
    needs: pre-commit
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            preset: linux-x86_64-release
            triple: linux-x86_64
          - os: ubuntu-latest
            preset: linux-arm64-release
            triple: linux-arm64
            cross: true
          - os: macos-latest
            preset: macos-arm64-release
            triple: macos-arm64
          - os: windows-latest
            preset: windows-x86_64-release
            triple: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install cross-compile toolchain (Linux ARM64)
        if: matrix.cross == true
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
      - name: Install Ninja (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build
      - name: Install Ninja (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja
      - name: Install Ninja (Windows)
        if: runner.os == 'Windows'
        run: choco install ninja --no-progress -y
      - name: Configure
        run: cmake --preset ${{ matrix.preset }}
      - name: Build
        run: cmake --build build/native/${{ matrix.preset }} --config Release
      - name: Install
        run: cmake --install build/native/${{ matrix.preset }} --config Release
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: banana-native-${{ matrix.triple }}
          path: out/native/${{ matrix.triple }}/

  native-sanitizers:
    name: Native / sanitizers
    needs: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends cmake ninja-build clang llvm
      - name: Configure (sanitizers preset)
        run: cmake --preset sanitizers
      - name: Build all native targets
        run: cmake --build build/sanitizers
      - name: Run tests under ASAN+UBSAN
        env:
          ASAN_OPTIONS: detect_leaks=1:abort_on_error=1
          UBSAN_OPTIONS: print_stacktrace=1:abort_on_error=1
        run: |
          cd build/sanitizers
          ctest --output-on-failure --timeout 60

  # --- Stage 4: integration / runtime (after build) ---
  runtime-compatibility:
    name: Runtime / workflow compatibility
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Prepare runtime compatibility script
        run: chmod +x scripts/check-workflow-runtime-deprecations.sh
      - name: Run workflow runtime compatibility check
        run: |
          bash scripts/check-workflow-runtime-deprecations.sh \
            --workflow .github/workflows/pre-commit.yml \
            --exceptions .github/runtime-compatibility-exceptions.yml \
            --output .artifacts/compose-ci/runtime-compatibility/runtime-compatibility.json \
            --text-output .artifacts/compose-ci/runtime-compatibility/runtime-compatibility.txt

  compose:
    name: Runtime / compose
    needs: [turbo, native-abi, runtime-compatibility]
    runs-on: ubuntu-latest
    env:
      BANANA_CI_LANE: compose-runtime
      BANANA_RUNTIME_BUILD: "true"
      BANANA_RUNTIME_HEALTH_URL: http://localhost:8080/health
      BANANA_RUNTIME_HEALTH_TIMEOUT_SEC: "60"
    steps:
      - uses: actions/checkout@v4
      - name: Prepare compose lane scripts
        run: |
          chmod +x scripts/compose-runtime.sh
          chmod +x scripts/compose-ci-preflight.sh
      - name: Preflight compose runtime lane
        run: |
          bash scripts/compose-ci-preflight.sh \
            --lane "$BANANA_CI_LANE" \
            --profile runtime \
            --entry-script scripts/compose-runtime.sh
      - name: Run compose runtime lane
        run: bash scripts/compose-runtime.sh api
      - name: Cleanup runtime profile
        if: always()
        run: docker compose --profile runtime down -v --remove-orphans

  compose-tests:
    name: Runtime / compose tests
    needs: compose
    runs-on: ubuntu-latest
    env:
      BANANA_CI_LANE: compose-tests
    steps:
      - uses: actions/checkout@v4
      - name: Prepare compose lane scripts
        run: |
          chmod +x scripts/compose-tests.sh
          chmod +x scripts/compose-ci-preflight.sh
      - name: Preflight compose tests lane
        run: |
          bash scripts/compose-ci-preflight.sh \
            --lane "$BANANA_CI_LANE" \
            --profile tests \
            --entry-script scripts/compose-tests.sh
      - name: Run compose tests lane
        run: bash scripts/compose-tests.sh
      - name: Cleanup tests profile
        if: always()
        run: docker compose --profile tests down -v --remove-orphans

  compose-electron:
    name: Runtime / compose electron smoke
    needs: compose
    runs-on: ubuntu-latest
    env:
      BANANA_CI_LANE: compose-electron
    steps:
      - uses: actions/checkout@v4
      - name: Prepare electron smoke lane
        run: chmod +x scripts/compose-electron.sh
      - name: Run electron smoke lane
        run: bash scripts/compose-electron.sh
      - name: Cleanup electron smoke profile
        if: always()
        run: docker compose --profile electron-smoke down -v --remove-orphans

  e2e-smoke:
    name: Runtime / e2e smoke
    needs: compose
    runs-on: ubuntu-latest
    env:
      BANANA_E2E_BOOTSTRAP_SERVICES: api
      BANANA_E2E_HEALTH_TIMEOUT_SEC: 180
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Bootstrap E2E runtime
        run: bash scripts/compose-e2e-bootstrap.sh
      - name: Run E2E smoke contract tests
        run: |
          mkdir -p .artifacts/e2e/test-results
          dotnet test tests/e2e/Banana.E2eTests.csproj -c Release \
            --results-directory .artifacts/e2e/test-results \
            --logger "trx;LogFileName=e2e-smoke.trx"
      - name: Cleanup apps profile
        if: always()
        run: docker compose --profile apps down -v --remove-orphans

  screenshot:
    name: Runtime / screenshot
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: turbo
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install Node.js (for Playwright browsers)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install React dependencies
        working-directory: src/typescript/react
        run: bun install
      - name: Install Playwright + browsers
        working-directory: src/typescript/react
        run: bunx playwright install chromium --with-deps
      - name: Start Vite dev server (background)
        working-directory: src/typescript/react
        run: |
          bun run dev &
          timeout 60 bash -c 'until curl -sf http://localhost:5173 > /dev/null 2>&1; do sleep 1; done'
      - name: Ensure docs/screenshots directory exists
        run: mkdir -p docs/screenshots
      - name: Run Playwright screenshot suite
        working-directory: src/typescript/react
        run: bun run screenshots
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5173
          CI: "true"
      - name: Update README gallery
        run: bash scripts/update-readme-screenshots.sh

  web-vitals:
    name: Runtime / web vitals budget
    needs: turbo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: cd src/typescript/react && bun install && bun run build
        env:
          VITE_BANANA_API_BASE_URL: ${{ secrets.VITE_BANANA_API_BASE_URL || 'https://api.example.com' }}
      - name: Lab vitals check (Lighthouse CI)
        run: bunx lhci autorun --config=.lighthouserc.json || echo "Lighthouse CI not configured yet - stub"

  # --- Final summary gate ---
  monorepo-pass-fail:
    name: Monorepo / Pass-Fail
    needs:
      - pre-commit
      - ai-contract-guard
      - spec-parity
      - wiki-lint
      - helm-lint
      - migration-discipline
      - turbo
      - native-abi
      - native-cross-platform
      - native-sanitizers
      - runtime-compatibility
      - compose
      - compose-tests
      - compose-electron
      - e2e-smoke
      - screenshot
      - web-vitals
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Publish monorepo summary
        run: |
          {
            echo "## Monorepo Summary"
            echo
            echo "| Lane | Result |"
            echo "| --- | --- |"
            echo "| Lint / pre-commit | ${{ needs.pre-commit.result }} |"
            echo "| Lint / AI contract guard | ${{ needs.ai-contract-guard.result }} |"
            echo "| Lint / spec parity | ${{ needs.spec-parity.result }} |"
            echo "| Lint / wiki | ${{ needs.wiki-lint.result }} |"
            echo "| Lint / helm charts | ${{ needs.helm-lint.result }} |"
            echo "| Lint / migration discipline | ${{ needs.migration-discipline.result }} |"
            echo "| Build / turbo | ${{ needs.turbo.result }} |"
            echo "| Native / ABI check | ${{ needs.native-abi.result }} |"
            echo "| Native / cross-platform | ${{ needs.native-cross-platform.result }} |"
            echo "| Native / sanitizers | ${{ needs.native-sanitizers.result }} |"
            echo "| Runtime / workflow compatibility | ${{ needs.runtime-compatibility.result }} |"
            echo "| Runtime / compose | ${{ needs.compose.result }} |"
            echo "| Runtime / compose tests | ${{ needs.compose-tests.result }} |"
            echo "| Runtime / compose electron smoke | ${{ needs.compose-electron.result }} |"
            echo "| Runtime / e2e smoke | ${{ needs.e2e-smoke.result }} |"
            echo "| Runtime / screenshot | ${{ needs.screenshot.result }} |"
            echo "| Runtime / web vitals budget | ${{ needs.web-vitals.result }} |"
            echo
            echo "Legacy deep lanes currently excluded from the blocking monorepo gate: dotnet coverage denominator, dotnet coverage aggregation, and API parity governance."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Verify all upstream jobs succeeded
        run: |
          echo "Monorepo result: ${{ contains(needs.*.result, 'failure') && 'FAILURE' || contains(needs.*.result, 'cancelled') && 'CANCELLED' || 'SUCCESS' }}"
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            exit 1
          fi
