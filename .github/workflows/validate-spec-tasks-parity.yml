name: validate-spec-tasks-parity

on:
  pull_request:
    paths:
      - ".specify/specs/**"
      - "scripts/validate-spec-tasks-parity.py"
      - "scripts/validate-spec-tasks-parity.sh"
      - "tests/scripts/test_validate_spec_tasks_parity.py"
      - ".github/workflows/validate-spec-tasks-parity.yml"
  push:
    branches:
      - main
    paths:
      - ".specify/specs/**"
      - "scripts/validate-spec-tasks-parity.py"

jobs:
  parity:
    name: spec.md <-> tasks.md parity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest
        run: pip install --quiet pytest

      - name: Run parser unit tests
        run: python -m pytest tests/scripts/test_validate_spec_tasks_parity.py -v

      - name: Lint all feature directories
        run: python scripts/validate-spec-tasks-parity.py --all
