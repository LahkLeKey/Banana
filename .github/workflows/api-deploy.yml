name: API Deploy

on:
  push:
    branches: [main]
    paths:
      - "src/typescript/api/**"
      - ".github/workflows/api-deploy.yml"

jobs:
  migrate-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Install API dependencies
        working-directory: src/typescript/api
        run: bun install --frozen-lockfile

      - name: Run Prisma migrations (production)
        # Spec 128 T003 — pre-deploy migration gate.
        # Requires DATABASE_URL secret pointing at the production PostgreSQL instance.
        # On failure the deploy step is skipped; rollback procedure: see docs/runbooks/db-migrations.md
        working-directory: src/typescript/api
        run: bunx prisma migrate deploy --schema prisma/schema.prisma
        env:
          DATABASE_URL: ${{ secrets.BANANA_PG_CONNECTION }}

      - name: Deploy API to Railway
        # Spec 128 T003 — deploy only after successful migration.
        # Set RAILWAY_TOKEN and RAILWAY_SERVICE_ID in repo secrets.
        run: |
          npm install -g @railway/cli
          railway up --service "${{ secrets.RAILWAY_SERVICE_ID }}" --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
