name: Secrets Rotation Reminder

on:
  workflow_call: {}
jobs:
  rotation-reminder:
    runs-on: ubuntu-latest
    steps:
      - name: Open rotation checklist issue
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().split("T")[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Quarterly Secrets Rotation — ${today}`,
              body: [
                "## Quarterly Secrets Rotation Checklist",
                "",
                "Rotate all production secrets per the [Secrets Rotation Runbook](docs/secrets-rotation.md).",
                "",
                "- [ ] Rotate `BANANA_PG_CONNECTION`",
                "- [ ] Rotate `VERCEL_TOKEN`",
                "- [ ] Rotate `SENTRY_AUTH_TOKEN`",
                "- [ ] Verify `banana.engineer` health after rotation",
                "- [ ] Verify `api.banana.engineer/health` after rotation",
                "- [ ] Update this issue with completion date",
              ].join("\n"),
              labels: ["security"]
            });
