          bash scripts/compose-ci-aggregate-failures.sh \
            --search-root .artifacts/aggregate \
            --output .artifacts/compose-ci/failure-aggregate-summary.json \
            --text-output .artifacts/compose-ci/failure-aggregate-summary.txt

      - name: Generate fallback coverage bundles for missing lanes
        if: always()
        run: |
          lanes=(
            native-unit
            dotnet-unit
            typescript-api-unit
            api-parity
            native-integration
            dotnet-integration
            typescript-api-integration
            compose-tests
            compose-runtime
            compose-electron
            e2e-smoke
          )

          for lane in "${lanes[@]}"; do
            out="$BANANA_COVERAGE_ARTIFACT_ROOT/$lane/coverage-lane-result.json"
            if [[ -f "$out" ]]; then
              continue
            fi

            domain="aspnet"
            layer="unit"
            failure_class="coverage_contract_violation"

            case "$lane" in
              native-unit)
                domain="native"
                layer="unit"
                ;;
              dotnet-unit)
                domain="aspnet"
                layer="unit"
                ;;
              typescript-api-unit)
                domain="typescript-api"
                layer="unit"
                ;;
              api-parity)
                domain="api-parity"
                layer="integration"
                failure_class="coverage_contract_violation"
                ;;
              native-integration)
                domain="native"
                layer="integration"
                ;;
              dotnet-integration)
                domain="aspnet"
                layer="integration"
                ;;
              typescript-api-integration)
                domain="typescript-api"
                layer="integration"
                ;;
              compose-tests)
                domain="aspnet"
                layer="e2e"
                failure_class="threshold_violation"
                ;;
              compose-runtime)
                domain="aspnet"
                layer="integration"
                failure_class="preflight_contract_violation"
                ;;
              compose-electron)
                domain="electron"
                layer="e2e"
                failure_class="flake_contract_violation"
                ;;
              e2e-smoke)
                domain="react-native"
                layer="e2e"
                failure_class="flake_contract_violation"
                ;;
            esac

            bash scripts/coverage-denominator-policy.sh \
              --snapshot-output "$BANANA_COVERAGE_ARTIFACT_ROOT/$lane/denominator-policy.json"

            normalize_args=(
              --lane-id "$lane"
              --domain "$domain"
              --layer "$layer"
              --status fail
              --failure-class "$failure_class"
              --evidence-bundle-path ".artifacts/compose-ci/$lane"
              --output "$out"
            )

            if [[ "$lane" == "compose-tests" ]]; then
              normalize_args+=(
                --lane-id api-react-e2e
                --e2e-channel api-react
              )
            elif [[ "$lane" == "compose-electron" ]]; then
              normalize_args+=(
                --lane-id electron-e2e
                --e2e-channel electron
              )
            elif [[ "$lane" == "e2e-smoke" ]]; then
              normalize_args+=(
                --lane-id mobile-e2e
                --e2e-channel mobile
              )
            fi

            bash scripts/coverage-normalize-lane-result.sh "${normalize_args[@]}"
          done

      - name: Build coverage aggregate summary
        if: always()
        run: |
          bash scripts/coverage-aggregate-summary.sh \
            --search-root .artifacts \
            --output .artifacts/compose-ci/coverage-aggregate-summary.json \
            --text-output .artifacts/compose-ci/coverage-aggregate-summary.txt

      - name: Add failure aggregate summary
        if: always()
        run: |
          {
            echo "## Compose CI Failure Aggregate"
            echo
            echo '```text'
            cat .artifacts/compose-ci/failure-aggregate-summary.txt
            echo '```'
            echo
            echo '```json'
            cat .artifacts/compose-ci/failure-aggregate-summary.json
            echo '```'
            echo
            echo "## Coverage Aggregate Summary"
            echo
            echo '```text'
            cat .artifacts/compose-ci/coverage-aggregate-summary.txt
            echo '```'
            echo
            echo '```json'
            cat .artifacts/compose-ci/coverage-aggregate-summary.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload failure aggregate artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compose-ci-failure-aggregate
          path: .artifacts/compose-ci/failure-aggregate-summary.json
          retention-days: 14

      - name: Upload coverage aggregate artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compose-ci-coverage-aggregate
          path: |
            .artifacts/compose-ci/coverage-aggregate-summary.json
            .artifacts/compose-ci/coverage-aggregate-summary.txt
          retention-days: 14
