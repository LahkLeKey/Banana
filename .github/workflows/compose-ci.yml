            --expected "$BANANA_CI_ARTIFACT_ROOT/$BANANA_CI_LANE/diagnostics/compose-ps.txt" \
            --optional "$BANANA_CI_ARTIFACT_ROOT/$BANANA_CI_LANE/diagnostics/electron-example.log" \
            --optional "$BANANA_CI_ARTIFACT_ROOT/$BANANA_CI_LANE/diagnostics/remediation.txt"

      - name: Validate compose electron lane contract
        if: always()
        run: bash scripts/validate-compose-ci-lane-contract.sh --lane "$BANANA_CI_LANE"

      - name: Add compose electron lane summary
        if: always()
        run: |
          {
            echo "## Compose Electron Lane Summary"
            echo
            echo "### Lane Result"
            echo
            echo '```json'
            cat "$BANANA_CI_ARTIFACT_ROOT/$BANANA_CI_LANE/lane-result.json"
            echo '```'
            echo
            echo "### Artifact Manifest"
            echo
            echo '```json'
            cat "$BANANA_CI_ARTIFACT_ROOT/$BANANA_CI_LANE/artifact-manifest.json"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload compose electron artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compose-electron-artifacts
          path: .artifacts/compose-ci/compose-electron

      - name: Cleanup electron profile
        if: always()
        run: docker compose --profile electron down -v --remove-orphans

  compose-ci-failure-aggregate:
    if: always()
    runs-on: ubuntu-latest
    needs:
      - native-c-tests-coverage
      - dotnet-api-coverage-denominator
      - dotnet-unit-tests-coverage
      - dotnet-integration-tests-coverage
      - dotnet-api-coverage-aggregate
      - typescript-api-tests
      - compose-tests
      - compose-runtime
      - compose-electron
      - e2e-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare failure aggregate script
        run: chmod +x scripts/compose-ci-aggregate-failures.sh

      - name: Download compose tests artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: compose-tests-artifacts
          path: .artifacts/aggregate/compose-tests

      - name: Download compose runtime artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: compose-runtime-artifacts
          path: .artifacts/aggregate/compose-runtime

      - name: Download compose electron artifacts
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: compose-electron-artifacts
          path: .artifacts/aggregate/compose-electron

      - name: Download native C job result artifact
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: native-c-tests-job-result
          path: .artifacts/aggregate/job-results/native-c-tests-coverage

      - name: Download denominator job result artifact
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: dotnet-api-coverage-denominator-job-result
          path: .artifacts/aggregate/job-results/dotnet-api-coverage-denominator

      - name: Download .NET unit job result artifact
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: dotnet-unit-tests-job-result
          path: .artifacts/aggregate/job-results/dotnet-unit-tests-coverage

      - name: Download .NET integration job result artifact
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: dotnet-integration-tests-job-result
          path: .artifacts/aggregate/job-results/dotnet-integration-tests-coverage

      - name: Download aggregate API coverage job result artifact
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: dotnet-api-coverage-aggregate-job-result
          path: .artifacts/aggregate/job-results/dotnet-api-coverage-aggregate

      - name: Download TypeScript API job result artifact
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: typescript-api-tests-job-result
          path: .artifacts/aggregate/job-results/typescript-api-tests

      - name: Download E2E smoke job result artifact
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: e2e-smoke-job-result
          path: .artifacts/aggregate/job-results/e2e-smoke

      - name: Build failure aggregate summary
        run: |
          bash scripts/compose-ci-aggregate-failures.sh \
            --search-root .artifacts/aggregate \
            --output .artifacts/compose-ci/failure-aggregate-summary.json \
            --text-output .artifacts/compose-ci/failure-aggregate-summary.txt

      - name: Add failure aggregate summary
        if: always()
        run: |
          {
            echo "## Compose CI Failure Aggregate"
            echo
            echo '```text'
            cat .artifacts/compose-ci/failure-aggregate-summary.txt
            echo '```'
            echo
            echo '```json'
            cat .artifacts/compose-ci/failure-aggregate-summary.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload failure aggregate artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compose-ci-failure-aggregate
          path: .artifacts/compose-ci/failure-aggregate-summary.json
