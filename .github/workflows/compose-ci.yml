name: Compose CI

on:
  push:
  workflow_dispatch:

jobs:
  native-c-tests-coverage:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cinterop
          POSTGRES_PASSWORD: cinterop
          POSTGRES_DB: cinterop
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cinterop -d cinterop"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install native coverage dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential cmake gcovr libpq-dev postgresql-client

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            if pg_isready -h 127.0.0.1 -p 5432 -U cinterop -d cinterop; then
              exit 0
            fi
            sleep 2
          done
          echo "PostgreSQL did not become ready in time"
          exit 1

      - name: Run native C tests with 80% coverage gate
        env:
          CINTEROP_PG_CONNECTION: host=127.0.0.1 port=5432 user=cinterop password=cinterop dbname=cinterop
        run: |
          chmod +x scripts/run-native-c-tests-with-coverage.sh
          scripts/run-native-c-tests-with-coverage.sh

      - name: Print native C summary in job output
        if: always()
        run: |
          echo "===== Native C Coverage Summary ====="
          cat .artifacts/native-c/Summary.txt

      - name: Add native C summary to GitHub Actions summary
        if: always()
        run: |
          {
            echo "## Native C Coverage Summary"
            echo
            echo '```text'
            cat .artifacts/native-c/Summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload native C coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-c-coverage
          path: .artifacts/native-c

  dotnet-tests-coverage:
    runs-on: ubuntu-latest
    needs: native-c-tests-coverage
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Build native library
        run: |
          cmake -S . -B build/native -DCMAKE_BUILD_TYPE=Release
          cmake --build build/native --config Release

      - name: Run unit tests with coverage
        run: |
          dotnet test tests/unit/CInteropSharp.UnitTests.csproj -c Release \
            --collect:"XPlat Code Coverage" \
            --results-directory .artifacts/test-results/unit \
            --logger "trx;LogFileName=unit.trx"

      - name: Run integration tests with coverage
        env:
          CINTEROP_NATIVE_PATH: ${{ github.workspace }}/build/native/bin
        run: |
          dotnet test tests/integration/CInteropSharp.IntegrationTests.csproj -c Release \
            --collect:"XPlat Code Coverage" \
            --results-directory .artifacts/test-results/integration \
            --logger "trx;LogFileName=integration.trx"

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool --version 5.3.11

      - name: Generate coverage report
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          reportgenerator \
            -reports:".artifacts/test-results/**/coverage.cobertura.xml" \
            -targetdir:".artifacts/coverage/report" \
            -reporttypes:"Cobertura;HtmlInline;TextSummary"

      - name: Print .NET coverage summary in job output
        if: always()
        run: |
          echo "===== .NET Coverage Summary ====="
          cat .artifacts/coverage/report/Summary.txt

      - name: Add .NET coverage summary to GitHub Actions summary
        if: always()
        run: |
          {
            echo "## .NET Coverage Summary"
            echo
            echo '```text'
            cat .artifacts/coverage/report/Summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: .artifacts/test-results

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .artifacts/coverage/report

  compose-tests:
    runs-on: ubuntu-latest
    needs: dotnet-tests-coverage
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Compose tests profile
        run: |
          docker compose --profile tests up --build --abort-on-container-exit --exit-code-from test-all test-all

      - name: Cleanup tests profile
        if: always()
        run: docker compose --profile tests down -v --remove-orphans

  compose-runtime:
    runs-on: ubuntu-latest
    needs: compose-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start runtime profile
        run: docker compose --profile runtime up --build -d api

      - name: Wait for API
        run: |
          for i in {1..30}; do
            if curl -fsS "http://localhost:8080/points?purchases=10&multiplier=2"; then
              exit 0
            fi
            sleep 2
          done
          echo "API did not become ready in time"
          exit 1

      - name: Cleanup runtime profile
        if: always()
        run: docker compose --profile runtime down -v --remove-orphans

  compose-electron:
    runs-on: ubuntu-latest
    needs: compose-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Compose electron profile
        run: |
          docker compose --profile electron up --build --abort-on-container-exit --exit-code-from electron-example electron-example

      - name: Cleanup electron profile
        if: always()
        run: docker compose --profile electron down -v --remove-orphans
