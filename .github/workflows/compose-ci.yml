  e2e-smoke:
    runs-on: ubuntu-latest
    env:
      BANANA_E2E_BOOTSTRAP_SERVICES: api
      BANANA_E2E_HEALTH_TIMEOUT_SEC: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare CI job result scripts
        run: |
          chmod +x scripts/compose-ci-write-lane-result.sh
          chmod +x scripts/compose-ci-write-job-result.sh

      - name: Setup .NET
        id: setup_dotnet_e2e
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Bootstrap E2E runtime
        id: bootstrap_e2e_runtime
        run: bash scripts/compose-e2e-bootstrap.sh

      - name: Detect E2E test project
        id: detect_e2e
        run: |
          if [[ -f tests/e2e/Banana.E2eTests.csproj ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run E2E smoke contract tests
        id: run_e2e_smoke_tests
        if: steps.detect_e2e.outputs.exists == 'true'
        run: |
          mkdir -p .artifacts/e2e/test-results
          dotnet test tests/e2e/Banana.E2eTests.csproj -c Release \
            --results-directory .artifacts/e2e/test-results \
            --logger "trx;LogFileName=e2e-smoke.trx"

      - name: Mark E2E tests as skipped when project is absent
        id: mark_e2e_skipped
        if: steps.detect_e2e.outputs.exists != 'true'
        run: |
          mkdir -p .artifacts/e2e/test-results
          cat > .artifacts/e2e/test-results/e2e-smoke.skipped.txt <<'EOF'
          E2E test project not found at tests/e2e/Banana.E2eTests.csproj.
          Smoke runtime bootstrap and payload capture still executed.
          EOF

      - name: Capture smoke API payloads
        if: always()
        run: |
          mkdir -p .artifacts/e2e/smoke
          curl -fsS "http://localhost:8080/health" > .artifacts/e2e/smoke/health.json || true
          curl -fsS "http://localhost:8080/banana?purchases=2&multiplier=3" > .artifacts/e2e/smoke/banana.json || true

      - name: Capture compose diagnostics
        if: always()
        run: |
          mkdir -p .artifacts/e2e/diagnostics
          docker compose --profile apps ps > .artifacts/e2e/diagnostics/compose-ps.txt || true
          docker compose --profile apps logs --no-color api > .artifacts/e2e/diagnostics/api.log || true

      - name: Add E2E smoke summary to GitHub Actions summary
        if: always()
        run: |
          {
            echo "## E2E Smoke Summary"
            echo
            echo "- Bootstrap service set: api"
            echo "- Health URL: http://localhost:8080/health"
            if [[ -f .artifacts/e2e/smoke/health.json ]]; then
              echo
              echo "### Health Payload"
              echo
              echo '```json'
              cat .artifacts/e2e/smoke/health.json
              echo '```'
            fi
            if [[ -f .artifacts/e2e/smoke/banana.json ]]; then
              echo
              echo "### Banana Payload"
              echo
              echo '```json'
              cat .artifacts/e2e/smoke/banana.json
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Teardown E2E runtime
        id: teardown_e2e_runtime
        if: always()
        run: bash scripts/compose-e2e-teardown.sh

      - name: Write E2E smoke job result record
        if: always()
        run: |
          job_status="pass"
          stage="teardown"
          reason_code="success"
          exit_code="0"

          if [[ "${{ steps.setup_dotnet_e2e.outcome }}" == "failure" ]]; then
            job_status="fail"
            stage="setup-dotnet"
            reason_code="dotnet_setup_failed"
            exit_code="1"
          elif [[ "${{ steps.bootstrap_e2e_runtime.outcome }}" == "failure" ]]; then
            job_status="fail"
            stage="bootstrap"
            reason_code="e2e_bootstrap_failed"
            exit_code="1"
          elif [[ "${{ steps.detect_e2e.outputs.exists }}" != "true" ]]; then
            job_status="skip"
            stage="project-detection"
            reason_code="e2e_project_missing"
            exit_code="0"
          elif [[ "${{ steps.run_e2e_smoke_tests.outcome }}" == "failure" ]]; then
            job_status="fail"
            stage="e2e-tests"
            reason_code="e2e_tests_failed"
            exit_code="1"
          elif [[ "${{ steps.teardown_e2e_runtime.outcome }}" == "failure" ]]; then
            job_status="fail"
            stage="teardown"
            reason_code="e2e_teardown_failed"
            exit_code="1"
          fi

          bash scripts/compose-ci-write-job-result.sh \
            --job e2e-smoke \
            --status "$job_status" \
            --stage "$stage" \
            --reason-code "$reason_code" \
            --exit-code "$exit_code"

      - name: Upload E2E smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-artifacts
          path: .artifacts/e2e

      - name: Upload E2E smoke job result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-job-result
          path: .artifacts/compose-ci/jobs/e2e-smoke

