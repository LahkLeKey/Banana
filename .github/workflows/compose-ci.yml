name: Compose CI

on:
  push:
  workflow_dispatch:

env:
  BANANA_CI_ARTIFACT_ROOT: .artifacts/compose-ci
  BANANA_CI_LANE_SCHEMA_VERSION: "1"
  BANANA_COVERAGE_ARTIFACT_ROOT: .artifacts/coverage
  BANANA_COVERAGE_THRESHOLD_PERCENT: "80"
  BANANA_COVERAGE_POLICY_VERSION: "v1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  workflow-runtime-compatibility:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare runtime compatibility script
        run: chmod +x scripts/check-workflow-runtime-deprecations.sh

      - name: Run workflow runtime compatibility check
        run: |
          bash scripts/check-workflow-runtime-deprecations.sh \
            --workflow .github/workflows/compose-ci.yml \
            --exceptions .github/runtime-compatibility-exceptions.yml \
            --output .artifacts/compose-ci/runtime-compatibility/runtime-compatibility.json \
            --text-output .artifacts/compose-ci/runtime-compatibility/runtime-compatibility.txt

      - name: Add workflow runtime compatibility summary
        if: always()
        run: |
          {
            echo "## Workflow Runtime Compatibility"
            echo
            echo '```text'
            cat .artifacts/compose-ci/runtime-compatibility/runtime-compatibility.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload workflow runtime compatibility artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-runtime-compatibility
          path: .artifacts/compose-ci/runtime-compatibility

  native-c-tests-coverage:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cinterop
          POSTGRES_PASSWORD: cinterop
          POSTGRES_DB: cinterop
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cinterop -d cinterop"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare CI job result scripts
        run: |
          chmod +x scripts/compose-ci-write-lane-result.sh
          chmod +x scripts/compose-ci-write-job-result.sh
          chmod +x scripts/coverage-denominator-policy.sh
          chmod +x scripts/coverage-normalize-lane-result.sh

      - name: Install native coverage dependencies
        id: install_native_cov_deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential cmake gcovr libpq-dev postgresql-client

      - name: Wait for PostgreSQL
        id: wait_native_postgres
        run: |
          for i in {1..30}; do
            if pg_isready -h 127.0.0.1 -p 5432 -U cinterop -d cinterop; then
              exit 0
            fi
            sleep 2
          done
          echo "PostgreSQL did not become ready in time"
          exit 1

      - name: Assert native DB connection target
        id: assert_native_db_target
        env:
          BANANA_PG_CONNECTION: host=127.0.0.1 port=5432 user=cinterop password=cinterop dbname=cinterop
        run: |
          if [[ -z "${BANANA_PG_CONNECTION:-}" ]]; then
            echo "BANANA_PG_CONNECTION is not set"
            exit 1
          fi

          host="$(tr ' ' '\n' <<< "$BANANA_PG_CONNECTION" | awk -F= '$1=="host" { print $2; exit }')"
          port="$(tr ' ' '\n' <<< "$BANANA_PG_CONNECTION" | awk -F= '$1=="port" { print $2; exit }')"

          if [[ -z "$host" || -z "$port" ]]; then
            echo "BANANA_PG_CONNECTION must include host and port"
            exit 1
          fi

          echo "Native DB target: host=$host port=$port"

      - name: Run native C tests with 80% coverage gate
        id: run_native_cov_gate
        env:
          BANANA_PG_CONNECTION: host=127.0.0.1 port=5432 user=cinterop password=cinterop dbname=cinterop
        run: |
          chmod +x scripts/run-native-c-tests-with-coverage.sh
          scripts/run-native-c-tests-with-coverage.sh

      - name: Normalize native unit coverage result
        if: always()
        run: |
          mkdir -p "$BANANA_COVERAGE_ARTIFACT_ROOT/native-unit"
          bash scripts/coverage-denominator-policy.sh \
            --snapshot-output "$BANANA_COVERAGE_ARTIFACT_ROOT/native-unit/denominator-policy.json"

          lane_status="fail"
          failure_class="coverage_contract_violation"
          measured_percent=""

          if [[ -f .artifacts/native-c/coverage-native.xml ]]; then
            measured_percent="$(python3 -c 'import sys,xml.etree.ElementTree as ET; root=ET.parse(sys.argv[1]).getroot(); print("{:.2f}".format(float(root.attrib.get("line-rate","0"))*100))' .artifacts/native-c/coverage-native.xml)"

            native_at_or_above_threshold="$(python3 -c 'import sys; print("1" if float(sys.argv[1]) >= 80.0 else "0")' "$measured_percent")"

            if [[ "$native_at_or_above_threshold" == "1" ]]; then
              lane_status="pass"
              failure_class=""
            else
              failure_class="threshold_violation"
            fi
          fi

          normalize_args=(
            --lane-id native-unit
            --domain native
            --layer unit
            --status "$lane_status"
            --failure-class "$failure_class"
            --evidence-bundle-path .artifacts/native-c
            --output "$BANANA_COVERAGE_ARTIFACT_ROOT/native-unit/coverage-lane-result.json"
          )

          if [[ -n "$measured_percent" ]]; then
            normalize_args+=(--measured-percent "$measured_percent")
          fi

          bash scripts/coverage-normalize-lane-result.sh "${normalize_args[@]}"

      - name: Write native C job result record
        if: always()
        run: |
          job_status="pass"
          stage="native-tests"
          reason_code="success"
          exit_code="0"

          if [[ "${{ steps.install_native_cov_deps.outcome }}" == "failure" ]]; then
            job_status="fail"
            stage="install-dependencies"
            reason_code="dependency_install_failed"
            exit_code="1"
          elif [[ "${{ steps.wait_native_postgres.outcome }}" == "failure" ]]; then
            job_status="fail"
            stage="wait-postgres"
            reason_code="postgres_unavailable"
            exit_code="1"
          elif [[ "${{ steps.assert_native_db_target.outcome }}" == "failure" ]]; then
            job_status="fail"
            stage="assert-db-target"
            reason_code="db_contract_invalid"
            exit_code="1"
          elif [[ "${{ steps.run_native_cov_gate.outcome }}" == "failure" ]]; then
            job_status="fail"
            stage="native-tests"
            reason_code="native_coverage_failed"
            exit_code="1"
          fi

          bash scripts/compose-ci-write-job-result.sh \
            --job native-c-tests-coverage \
            --status "$job_status" \
            --stage "$stage" \
            --reason-code "$reason_code" \
            --exit-code "$exit_code"

      - name: Print native C summary in job output
        if: always()
        run: |
          echo "===== Native C Coverage Summary ====="
          if [[ -f .artifacts/native-c/Summary.txt ]]; then
            cat .artifacts/native-c/Summary.txt
          else
            echo "Summary not available; native tests likely failed before report generation."
          fi

      - name: Add native C summary to GitHub Actions summary
        if: always()
        run: |
          {
            echo "## Native C Coverage Summary"
            echo
            echo '```text'
            if [[ -f .artifacts/native-c/Summary.txt ]]; then
              cat .artifacts/native-c/Summary.txt
            else
              echo "Summary not available; native tests likely failed before report generation."
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload native C job result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-c-tests-job-result
          path: .artifacts/compose-ci/jobs/native-c-tests-coverage

      - name: Upload native C coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-c-coverage
          path: .artifacts/native-c

  dotnet-api-coverage-denominator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare CI job result scripts
        run: |
          chmod +x scripts/compose-ci-write-lane-result.sh
          chmod +x scripts/compose-ci-write-job-result.sh
          chmod +x scripts/coverage-denominator-policy.sh
          chmod +x scripts/coverage-normalize-lane-result.sh

      - name: Validate Banana.Api denominator manifest
        id: validate_api_denominator
        run: |
          bash scripts/check-banana-api-coverage-denominator.sh

      - name: Write denominator validation job result record
        if: always()
        run: |
          job_status="pass"
          stage="coverage-denominator"
          reason_code="success"
          exit_code="0"

          if [[ "${{ steps.validate_api_denominator.outcome }}" == "failure" ]]; then
            job_status="fail"
            stage="coverage-denominator"
            reason_code="coverage_denominator_invalid"
            exit_code="1"
          fi

          bash scripts/compose-ci-write-job-result.sh \
            --job dotnet-api-coverage-denominator \
            --status "$job_status" \
            --stage "$stage" \
            --reason-code "$reason_code" \
            --exit-code "$exit_code"

      - name: Upload denominator validation job result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-api-coverage-denominator-job-result
          path: .artifacts/compose-ci/jobs/dotnet-api-coverage-denominator

  dotnet-unit-tests-coverage:
    needs:
      - dotnet-api-coverage-denominator
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cinterop
          POSTGRES_PASSWORD: cinterop
          POSTGRES_DB: cinterop
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cinterop -d cinterop"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare CI job result scripts
        run: |
          chmod +x scripts/compose-ci-write-lane-result.sh
          chmod +x scripts/compose-ci-write-job-result.sh

      - name: Setup .NET
        id: setup_dotnet_unit
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install native dependencies
        id: install_native_deps_unit
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake libpq-dev postgresql-client

      - name: Wait for PostgreSQL
        id: wait_postgres_unit
        run: |
          for i in {1..30}; do
            if pg_isready -h 127.0.0.1 -p 5432 -U cinterop -d cinterop; then
              exit 0
            fi
            sleep 2
          done
          echo "PostgreSQL did not become ready in time"
          exit 1

      - name: Build native library
        id: build_native_unit
        run: |
          cmake -S . -B build/native -DCMAKE_BUILD_TYPE=Release -DBANANA_ENABLE_POSTGRES=ON
          cmake --build build/native --config Release

      - name: Run unit tests with coverage
        id: run_unit_tests_cov
        env:
          BANANA_NATIVE_PATH: ${{ github.workspace }}/build/native/bin
          BANANA_PG_CONNECTION: host=127.0.0.1 port=5432 user=cinterop password=cinterop dbname=cinterop
        run: |
          dotnet test tests/unit/Banana.Api.Tests.Unit.csproj -c Release \
            --collect:"XPlat Code Coverage" \
            --results-directory .artifacts/test-results/unit \
            --logger "trx;LogFileName=unit.trx"

      - name: Install ReportGenerator
        id: install_reportgen_unit
        run: dotnet tool install --global dotnet-reportgenerator-globaltool --version 5.3.11

      - name: Generate unit coverage report
        id: generate_unit_report
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          reportgenerator \
            -reports:".artifacts/test-results/unit/**/coverage.cobertura.xml" \
            -targetdir:".artifacts/coverage/unit-report" \
            -reporttypes:"Cobertura;HtmlInline;TextSummary" \
            -assemblyfilters:"+Banana.Api;-*Tests"

      - name: Enforce .NET unit line-rate gate (80%)
        id: enforce_unit_line_gate
        run: |
          bash scripts/check-dotnet-coverage-threshold.sh \
            .artifacts/coverage/unit-report/Summary.txt \
            80 \
            .artifacts/coverage/unit-report/unit-line-rate-gate.json \
            unit-line-rate

      - name: Normalize .NET unit coverage result
        if: always()
        run: |
          mkdir -p "$BANANA_COVERAGE_ARTIFACT_ROOT/dotnet-unit"
          bash scripts/coverage-denominator-policy.sh \
            --snapshot-output "$BANANA_COVERAGE_ARTIFACT_ROOT/dotnet-unit/denominator-policy.json"

          lane_status="fail"
          failure_class="coverage_contract_violation"
          measured_percent=""

          if [[ -f .artifacts/coverage/unit-report/Summary.txt ]]; then
            measured_percent="$(python3 -c 'import re,sys; text=open(sys.argv[1],encoding="utf-8").read(); m=re.findall(r"(\d+(?:\.\d+)?)\s*%",text); print(m[0] if m else "")' .artifacts/coverage/unit-report/Summary.txt)"
          fi

          dotnet_at_or_above_threshold="0"
          if [[ -n "$measured_percent" ]]; then
            dotnet_at_or_above_threshold="$(python3 -c 'import sys; print("1" if float(sys.argv[1]) >= 80.0 else "0")' "$measured_percent")"
          fi

          if [[ -n "$measured_percent" && "$dotnet_at_or_above_threshold" == "1" ]]; then
            lane_status="pass"
            failure_class=""
          elif [[ -n "$measured_percent" ]]; then
            failure_class="threshold_violation"
          fi

          normalize_args=(
            --lane-id dotnet-unit
            --domain aspnet
            --layer unit
            --status "$lane_status"
            --failure-class "$failure_class"
            --evidence-bundle-path .artifacts/coverage/unit-report
            --output "$BANANA_COVERAGE_ARTIFACT_ROOT/dotnet-unit/coverage-lane-result.json"
          )

          if [[ -n "$measured_percent" ]]; then
            normalize_args+=(--measured-percent "$measured_percent")
          fi

          bash scripts/coverage-normalize-lane-result.sh "${normalize_args[@]}"

      - name: Write .NET unit job result record
        if: always()
        run: |
          job_status="pass"
          stage="unit-line-gate"
          reason_code="success"
          exit_code="0"

          if [[ "${{ steps.setup_dotnet_unit.outcome }}" == "failure" ]]; then
            job_status="fail"
            stage="setup-dotnet"
            reason_code="dotnet_setup_failed"
            exit_code="1"
          elif [[ "${{ steps.install_native_deps_unit.outcome }}" == "failure" ]]; then
            job_status="fail"
            stage="install-dependencies"
            reason_code="dependency_install_failed"
            exit_code="1"
          elif [[ "${{ steps.wait_postgres_unit.outcome }}" == "failure" ]]; then
            job_status="fail"
            stage="wait-postgres"
            reason_code="postgres_unavailable"
            exit_code="1"
          elif [[ "${{ steps.build_native_unit.outcome }}" == "failure" ]]; then
            job_status="fail"
            stage="build-native"
            reason_code="native_build_failed"
            exit_code="1"
          elif [[ "${{ steps.run_unit_tests_cov.outcome }}" == "failure" ]]; then
            job_status="fail"
            stage="unit-tests"
            reason_code="unit_tests_failed"
            exit_code="1"
          elif [[ "${{ steps.install_reportgen_unit.outcome }}" == "failure" ]]; then
            job_status="fail"
            stage="install-reportgenerator"
            reason_code="coverage_tool_install_failed"
            exit_code="1"
          elif [[ "${{ steps.generate_unit_report.outcome }}" == "failure" ]]; then
            job_status="fail"
            stage="generate-coverage-report"
            reason_code="coverage_report_failed"
            exit_code="1"
          elif [[ "${{ steps.enforce_unit_line_gate.outcome }}" == "failure" ]]; then
            job_status="fail"
            stage="unit-line-gate"
            reason_code="coverage_gate_failed"
            exit_code="1"
          fi

          bash scripts/compose-ci-write-job-result.sh \
            --job dotnet-unit-tests-coverage \
            --status "$job_status" \
            --stage "$stage" \
            --reason-code "$reason_code" \
            --exit-code "$exit_code"

      - name: Ensure unit artifact paths exist
        if: always()
        run: |
          mkdir -p .artifacts/test-results/unit
          mkdir -p .artifacts/coverage/unit-report

          if [[ ! -f .artifacts/coverage/unit-report/Summary.txt ]]; then
            cat > .artifacts/coverage/unit-report/Summary.txt <<'EOF'
            Unit coverage summary was not produced because an earlier stage failed.
            EOF
          fi

          if [[ -z "$(find .artifacts/test-results/unit -type f -print -quit 2>/dev/null)" ]]; then
            : > .artifacts/test-results/unit/.placeholder
          fi

      - name: Print .NET unit coverage summary in job output
        if: always()
        run: |
          echo "===== .NET Unit Coverage Summary ====="
          if [[ -f .artifacts/coverage/unit-report/Summary.txt ]]; then
            cat .artifacts/coverage/unit-report/Summary.txt
          else
            echo "Unit summary not available."
          fi
          if [[ -f .artifacts/coverage/unit-report/unit-line-rate-gate.json ]]; then
            echo "===== .NET Unit Coverage Gate ====="
            cat .artifacts/coverage/unit-report/unit-line-rate-gate.json
          fi

      - name: Add .NET unit coverage summary to GitHub Actions summary
        if: always()
        run: |
          {
            echo "## .NET Unit Coverage Summary"
            echo
            echo '```text'
            if [[ -f .artifacts/coverage/unit-report/Summary.txt ]]; then
              cat .artifacts/coverage/unit-report/Summary.txt
            else
              echo "Unit summary not available."
            fi
            echo '```'
            if [[ -f .artifacts/coverage/unit-report/unit-line-rate-gate.json ]]; then
              echo
              echo "## .NET Unit Coverage Gate"
              echo
              echo '```json'
              cat .artifacts/coverage/unit-report/unit-line-rate-gate.json
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: .artifacts/test-results/unit

      - name: Upload unit coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage-report
          path: .artifacts/coverage/unit-report

      - name: Upload .NET unit job result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-unit-tests-job-result
          path: .artifacts/compose-ci/jobs/dotnet-unit-tests-coverage

  dotnet-integration-tests-coverage:
    needs:
      - dotnet-api-coverage-denominator
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cinterop
          POSTGRES_PASSWORD: cinterop
          POSTGRES_DB: cinterop
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cinterop -d cinterop"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare CI job result scripts
        run: |
          chmod +x scripts/compose-ci-write-lane-result.sh
          chmod +x scripts/compose-ci-write-job-result.sh

      - name: Setup .NET
        id: setup_dotnet_integration
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install native dependencies
        id: install_native_deps_integration
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake libpq-dev postgresql-client

      - name: Wait for PostgreSQL
        id: wait_postgres_integration
        run: |
          for i in {1..30}; do
            if pg_isready -h 127.0.0.1 -p 5432 -U cinterop -d cinterop; then
              exit 0
            fi
            sleep 2
          done
          echo "PostgreSQL did not become ready in time"
          exit 1

      - name: Build native library
        id: build_native_integration
        run: |
          cmake -S . -B build/native -DCMAKE_BUILD_TYPE=Release -DBANANA_ENABLE_POSTGRES=ON
          cmake --build build/native --config Release

      - name: Detect integration test project
        id: detect_integration
        run: |
          if [[ -f tests/integration/Banana.IntegrationTests.csproj ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Run integration tests with coverage
        id: run_integration_tests_cov
        if: steps.detect_integration.outputs.exists == 'true'
        env:
          BANANA_NATIVE_PATH: ${{ github.workspace }}/build/native/bin
          BANANA_PG_CONNECTION: host=127.0.0.1 port=5432 user=cinterop password=cinterop dbname=cinterop
        run: |
          dotnet test tests/integration/Banana.IntegrationTests.csproj -c Release \
            --collect:"XPlat Code Coverage" \
            --results-directory .artifacts/test-results/integration \
            --logger "trx;LogFileName=integration.trx"

      - name: Install ReportGenerator
        id: install_reportgen_integration
        if: steps.detect_integration.outputs.exists == 'true'
        run: dotnet tool install --global dotnet-reportgenerator-globaltool --version 5.3.11

      - name: Generate integration coverage report
        id: generate_integration_report
        if: steps.detect_integration.outputs.exists == 'true'
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          reportgenerator \
            -reports:".artifacts/test-results/integration/**/coverage.cobertura.xml" \
            -targetdir:".artifacts/coverage/integration-report" \
            -reporttypes:"Cobertura;HtmlInline;TextSummary" \
            -assemblyfilters:"+Banana.Api;-*Tests"

      - name: Generate integration uncovered-lines artifact
        id: generate_integration_uncovered
        if: steps.detect_integration.outputs.exists == 'true'
        run: |
          report_file=".artifacts/coverage/integration-report/Cobertura.xml"
          if [[ ! -f "$report_file" ]]; then
            echo "Expected integration Cobertura XML report not found at $report_file"
            exit 1
          fi

          python scripts/export-cobertura-uncovered-lines.py \
            --report "$report_file" \
            --output-json .artifacts/coverage/integration-report/uncovered-lines.json \
            --output-text .artifacts/coverage/integration-report/uncovered-lines.txt

      - name: Generate .NET integration line-rate gate diagnostics (80%)
        id: generate_integration_line_gate
        if: steps.detect_integration.outputs.exists == 'true'
        run: |
          bash scripts/check-dotnet-coverage-threshold.sh \
            .artifacts/coverage/integration-report/Summary.txt \
            80 \
            .artifacts/coverage/integration-report/integration-line-rate-gate.json \
            integration-line-rate

      - name: Normalize .NET integration coverage result
        if: always()
        run: |
          mkdir -p "$BANANA_COVERAGE_ARTIFACT_ROOT/dotnet-integration"
          bash scripts/coverage-denominator-policy.sh \
            --snapshot-output "$BANANA_COVERAGE_ARTIFACT_ROOT/dotnet-integration/denominator-policy.json"

          lane_status="fail"
          failure_class="coverage_contract_violation"
          measured_percent=""

          if [[ "${{ steps.detect_integration.outputs.exists }}" != "true" ]]; then
            lane_status="not-applicable"
            failure_class=""
          elif [[ -f .artifacts/coverage/integration-report/Summary.txt ]]; then
            measured_percent="$(python3 -c 'import re,sys; text=open(sys.argv[1],encoding="utf-8").read(); m=re.findall(r"(\d+(?:\.\d+)?)\s*%",text); print(m[0] if m else "")' .artifacts/coverage/integration-report/Summary.txt)"

            dotnet_integration_at_or_above_threshold="0"
            if [[ -n "$measured_percent" ]]; then
              dotnet_integration_at_or_above_threshold="$(python3 -c 'import sys; print("1" if float(sys.argv[1]) >= 80.0 else "0")' "$measured_percent")"
            fi

            if [[ -n "$measured_percent" && "$dotnet_integration_at_or_above_threshold" == "1" ]]; then
              lane_status="pass"
              failure_class=""
            elif [[ -n "$measured_percent" ]]; then
              failure_class="threshold_violation"
            fi
          fi

          normalize_args=(
            --lane-id dotnet-integration
            --domain aspnet
            --layer integration
            --status "$lane_status"
            --failure-class "$failure_class"
            --interop-entry-point BananaSearchController.Get
            --interop-entry-point BananaSearchService.SearchAsync
            --interop-entry-point PipelineRunner.ExecuteAsync
            --evidence-bundle-path .artifacts/coverage/integration-report
            --output "$BANANA_COVERAGE_ARTIFACT_ROOT/dotnet-integration/coverage-lane-result.json"
          )

          if [[ -n "$measured_percent" ]]; then
            normalize_args+=(--measured-percent "$measured_percent")
          fi

          bash scripts/coverage-normalize-lane-result.sh "${normalize_args[@]}"

      - name: Write placeholder integration diagnostics when project is absent
        id: write_integration_placeholder
        if: steps.detect_integration.outputs.exists != 'true'
        run: |
          mkdir -p .artifacts/test-results/integration
          mkdir -p .artifacts/coverage/integration-report

          cat > .artifacts/coverage/integration-report/Summary.txt <<'EOF'
          Integration test project not found at tests/integration/Banana.IntegrationTests.csproj.
          Coverage generation was skipped for this job.
          EOF

          cat > .artifacts/coverage/integration-report/integration-line-rate-gate.json <<'EOF'
          {
            "schema_version": 1,
            "gate": "integration-line-rate",
            "passed": true,
            "skipped": true,
            "reason": "integration_project_missing"
          }
          EOF

          : > .artifacts/coverage/integration-report/uncovered-lines.txt
          : > .artifacts/test-results/integration/.placeholder

      - name: Write .NET integration job result record
        if: always()
        run: |
          job_status="pass"
          stage="integration-line-gate"
          reason_code="success"
          exit_code="0"

          if [[ "${{ steps.setup_dotnet_integration.outcome }}" == "failure" ]]; then
            job_status="fail"
            stage="setup-dotnet"
            reason_code="dotnet_setup_failed"
            exit_code="1"
          elif [[ "${{ steps.install_native_deps_integration.outcome }}" == "failure" ]]; then
            job_status="fail"
            stage="install-dependencies"
            reason_code="dependency_install_failed"
            exit_code="1"
          elif [[ "${{ steps.wait_postgres_integration.outcome }}" == "failure" ]]; then
            job_status="fail"
            stage="wait-postgres"
            reason_code="postgres_unavailable"
            exit_code="1"
          elif [[ "${{ steps.build_native_integration.outcome }}" == "failure" ]]; then
            job_status="fail"
            stage="build-native"
            reason_code="native_build_failed"
            exit_code="1"
          elif [[ "${{ steps.detect_integration.outputs.exists }}" != "true" ]]; then
            job_status="skip"
            stage="project-detection"
            reason_code="integration_project_missing"
            exit_code="0"
          elif [[ "${{ steps.run_integration_tests_cov.outcome }}" == "failure" ]]; then
            job_status="fail"
            stage="integration-tests"
            reason_code="integration_tests_failed"
            exit_code="1"
          elif [[ "${{ steps.install_reportgen_integration.outcome }}" == "failure" ]]; then
            job_status="fail"
            stage="install-reportgenerator"
            reason_code="coverage_tool_install_failed"
            exit_code="1"
          elif [[ "${{ steps.generate_integration_report.outcome }}" == "failure" ]]; then
            job_status="fail"
            stage="generate-coverage-report"
            reason_code="coverage_report_failed"
            exit_code="1"
          elif [[ "${{ steps.generate_integration_uncovered.outcome }}" == "failure" ]]; then
            job_status="fail"
            stage="export-uncovered-lines"
            reason_code="uncovered_lines_export_failed"
            exit_code="1"
          elif [[ "${{ steps.generate_integration_line_gate.outcome }}" == "failure" ]]; then
            job_status="fail"
            stage="integration-line-gate"
            reason_code="threshold_violation"
            exit_code="1"
          fi

          bash scripts/compose-ci-write-job-result.sh \
            --job dotnet-integration-tests-coverage \
            --status "$job_status" \
            --stage "$stage" \
            --reason-code "$reason_code" \
            --exit-code "$exit_code"

      - name: Ensure integration artifact paths exist
        if: always()
        run: |
          mkdir -p .artifacts/test-results/integration
          mkdir -p .artifacts/coverage/integration-report

          if [[ ! -f .artifacts/coverage/integration-report/Summary.txt ]]; then
            cat > .artifacts/coverage/integration-report/Summary.txt <<'EOF'
            Integration coverage summary was not produced because an earlier stage failed.
            EOF
          fi

          if [[ ! -f .artifacts/coverage/integration-report/integration-line-rate-gate.json ]]; then
            cat > .artifacts/coverage/integration-report/integration-line-rate-gate.json <<'EOF'
            {
              "schema_version": 1,
              "gate": "integration-line-rate",
              "passed": false,
              "skipped": false,
              "reason": "integration_artifacts_missing"
            }
            EOF
          fi

          if [[ -z "$(find .artifacts/test-results/integration -type f -print -quit 2>/dev/null)" ]]; then
            : > .artifacts/test-results/integration/.placeholder
          fi

          if [[ ! -f .artifacts/coverage/integration-report/uncovered-lines.txt ]]; then
            : > .artifacts/coverage/integration-report/uncovered-lines.txt
          fi

      - name: Print .NET integration coverage summary in job output
        if: always()
        run: |
          echo "===== .NET Integration Coverage Summary ====="
          if [[ -f .artifacts/coverage/integration-report/Summary.txt ]]; then
            cat .artifacts/coverage/integration-report/Summary.txt
          else
            echo "Integration summary not available."
          fi
          if [[ -f .artifacts/coverage/integration-report/integration-line-rate-gate.json ]]; then
            echo "===== .NET Integration Coverage Gate ====="
            cat .artifacts/coverage/integration-report/integration-line-rate-gate.json
          fi
          if [[ -f .artifacts/coverage/integration-report/uncovered-lines.txt ]]; then
            echo "===== .NET Integration Uncovered Lines (first 200 lines) ====="
            head -n 200 .artifacts/coverage/integration-report/uncovered-lines.txt
          fi

      - name: Add .NET integration coverage summary to GitHub Actions summary
        if: always()
        run: |
          {
            echo "## .NET Integration Coverage Summary"
            echo
            echo '```text'
            if [[ -f .artifacts/coverage/integration-report/Summary.txt ]]; then
              cat .artifacts/coverage/integration-report/Summary.txt
            else
              echo "Integration summary not available."
            fi
            echo '```'
            if [[ -f .artifacts/coverage/integration-report/integration-line-rate-gate.json ]]; then
              echo
              echo "## .NET Integration Coverage Gate"
              echo
              echo '```json'
              cat .artifacts/coverage/integration-report/integration-line-rate-gate.json
              echo '```'
            fi
            if [[ -f .artifacts/coverage/integration-report/uncovered-lines.txt ]]; then
              echo
              echo "## .NET Integration Uncovered Lines"
              echo
              echo '```text'
              head -n 200 .artifacts/coverage/integration-report/uncovered-lines.txt
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-results
          path: .artifacts/test-results/integration

      - name: Upload integration coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-coverage-report
          path: .artifacts/coverage/integration-report

      - name: Upload .NET integration job result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-integration-tests-job-result
          path: .artifacts/compose-ci/jobs/dotnet-integration-tests-coverage

  dotnet-api-coverage-aggregate:
    runs-on: ubuntu-latest
    needs:
      - dotnet-unit-tests-coverage
      - dotnet-integration-tests-coverage
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare CI job result scripts
        run: |
          chmod +x scripts/compose-ci-write-lane-result.sh
          chmod +x scripts/compose-ci-write-job-result.sh

      - name: Setup .NET
        id: setup_dotnet_aggregate
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Download unit test results
        id: download_unit_results
        uses: actions/download-artifact@v4
        with:
          name: unit-test-results
          path: .artifacts/aggregate/unit

      - name: Download integration test results
        id: download_integration_results
        uses: actions/download-artifact@v4
        with:
          name: integration-test-results
          path: .artifacts/aggregate/integration

      - name: Install ReportGenerator
        id: install_reportgen_aggregate
        run: dotnet tool install --global dotnet-reportgenerator-globaltool --version 5.3.11

      - name: Generate aggregate API coverage report
        id: generate_aggregate_report
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          reportgenerator \
            -reports:".artifacts/aggregate/**/coverage.cobertura.xml" \
            -targetdir:".artifacts/coverage/aggregate-report" \
            -reporttypes:"Cobertura;HtmlInline;TextSummary" \
            -assemblyfilters:"+Banana.Api;-*Tests"

      - name: Write aggregate API coverage job result record
        if: always()
        run: |
          job_status="pass"
          stage="aggregate-report"
          reason_code="success"
          exit_code="0"

          if [[ "${{ steps.setup_dotnet_aggregate.outcome }}" == "failure" ]]; then
            job_status="fail"
            stage="setup-dotnet"
            reason_code="dotnet_setup_failed"
            exit_code="1"
          elif [[ "${{ steps.download_unit_results.outcome }}" == "failure" ]]; then
            job_status="fail"
            stage="download-unit-results"
            reason_code="unit_results_missing"
            exit_code="1"
          elif [[ "${{ steps.download_integration_results.outcome }}" == "failure" ]]; then
            job_status="fail"
            stage="download-integration-results"
            reason_code="integration_results_missing"
            exit_code="1"
          elif [[ "${{ steps.install_reportgen_aggregate.outcome }}" == "failure" ]]; then
            job_status="fail"
            stage="install-reportgenerator"
            reason_code="coverage_tool_install_failed"
            exit_code="1"
          elif [[ "${{ steps.generate_aggregate_report.outcome }}" == "failure" ]]; then
            job_status="fail"
            stage="aggregate-report"
            reason_code="aggregate_report_failed"
            exit_code="1"
          fi

          bash scripts/compose-ci-write-job-result.sh \
            --job dotnet-api-coverage-aggregate \
            --status "$job_status" \
            --stage "$stage" \
            --reason-code "$reason_code" \
            --exit-code "$exit_code"

      - name: Ensure aggregate coverage artifact path exists
        if: always()
        run: |
          mkdir -p .artifacts/coverage/aggregate-report
          if [[ ! -f .artifacts/coverage/aggregate-report/Summary.txt ]]; then
            cat > .artifacts/coverage/aggregate-report/Summary.txt <<'EOF'
            Aggregate coverage summary was not produced because an earlier stage failed.
            EOF
          fi

      - name: Print .NET aggregate API coverage summary in job output
        if: always()
        run: |
          echo "===== .NET Aggregate API Coverage Summary ====="
          if [[ -f .artifacts/coverage/aggregate-report/Summary.txt ]]; then
            cat .artifacts/coverage/aggregate-report/Summary.txt
          else
            echo "Aggregate summary not available."
          fi

      - name: Add .NET aggregate API coverage summary to GitHub Actions summary
        if: always()
        run: |
          {
            echo "## .NET Aggregate API Coverage Summary"
            echo
            echo '```text'
            if [[ -f .artifacts/coverage/aggregate-report/Summary.txt ]]; then
              cat .artifacts/coverage/aggregate-report/Summary.txt
            else
              echo "Aggregate summary not available."
            fi
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload aggregate coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-coverage-aggregate
          path: .artifacts/coverage/aggregate-report

      - name: Upload aggregate coverage job result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-api-coverage-aggregate-job-result
          path: .artifacts/compose-ci/jobs/dotnet-api-coverage-aggregate

  typescript-api-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/typescript/api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare CI job result scripts
        run: |
          chmod +x "$GITHUB_WORKSPACE/scripts/compose-ci-write-lane-result.sh"
          chmod +x "$GITHUB_WORKSPACE/scripts/compose-ci-write-job-result.sh"
          chmod +x "$GITHUB_WORKSPACE/scripts/coverage-denominator-policy.sh"
          chmod +x "$GITHUB_WORKSPACE/scripts/coverage-normalize-lane-result.sh"

      - name: Setup Bun
        id: setup_bun_typescript
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9

      - name: Install dependencies
        id: install_typescript_deps
        run: bun install --frozen-lockfile

      - name: Type check
        id: typecheck_typescript_api
        run: bun run build

      - name: Run TypeScript API tests with coverage
        id: run_typescript_api_tests
        run: |
          mkdir -p "$GITHUB_WORKSPACE/.artifacts/typescript-api"
          if find src -type f \( -name "*.test.ts" -o -name "*.spec.ts" -o -name "*.test.tsx" -o -name "*.spec.tsx" \) | grep -q .; then
            bun test --coverage | tee "$GITHUB_WORKSPACE/.artifacts/typescript-api/coverage.txt"
            echo "executed" > "$GITHUB_WORKSPACE/.artifacts/typescript-api/test-run-mode.txt"
          else
            echo "No TypeScript API test files found; coverage run skipped." | tee "$GITHUB_WORKSPACE/.artifacts/typescript-api/coverage.txt"
            echo "no-tests" > "$GITHUB_WORKSPACE/.artifacts/typescript-api/test-run-mode.txt"
          fi

      - name: Write TypeScript API job result record
        if: always()
        run: |
          job_status="pass"
          stage="tests"
          reason_code="success"
          exit_code="0"

          if [[ "${{ steps.setup_bun_typescript.outcome }}" == "failure" ]]; then
            job_status="fail"
            stage="setup-bun"
            reason_code="bun_setup_failed"
            exit_code="1"
          elif [[ "${{ steps.install_typescript_deps.outcome }}" == "failure" ]]; then
            job_status="fail"
            stage="install-dependencies"
            reason_code="dependency_install_failed"
            exit_code="1"
          elif [[ "${{ steps.typecheck_typescript_api.outcome }}" == "failure" ]]; then
            job_status="fail"
            stage="type-check"
            reason_code="typecheck_failed"
            exit_code="1"
          elif [[ "${{ steps.run_typescript_api_tests.outcome }}" == "failure" ]]; then
            job_status="fail"
            stage="tests"
            reason_code="typescript_tests_failed"
            exit_code="1"
          elif [[ -f "$GITHUB_WORKSPACE/.artifacts/typescript-api/test-run-mode.txt" ]] && [[ "$(cat "$GITHUB_WORKSPACE/.artifacts/typescript-api/test-run-mode.txt")" == "no-tests" ]]; then
            job_status="skip"
            stage="tests"
            reason_code="typescript_tests_missing"
            exit_code="0"
          fi

          bash "$GITHUB_WORKSPACE/scripts/compose-ci-write-job-result.sh" \
            --job typescript-api-tests \
            --status "$job_status" \
            --stage "$stage" \
            --reason-code "$reason_code" \
            --exit-code "$exit_code"

      - name: Normalize TypeScript API unit coverage result
        if: always()
        run: |
          mkdir -p "$GITHUB_WORKSPACE/.artifacts/coverage/typescript-api-unit"

          bash "$GITHUB_WORKSPACE/scripts/coverage-denominator-policy.sh" \
            --snapshot-output "$GITHUB_WORKSPACE/.artifacts/coverage/typescript-api-unit/denominator-policy.json"

          lane_status="fail"
          failure_class="coverage_contract_violation"

          if [[ "${{ steps.run_typescript_api_tests.outcome }}" == "success" ]]; then
            lane_status="pass"
            failure_class=""
          fi

          if [[ -f "$GITHUB_WORKSPACE/.artifacts/typescript-api/test-run-mode.txt" ]] && [[ "$(cat "$GITHUB_WORKSPACE/.artifacts/typescript-api/test-run-mode.txt")" == "no-tests" ]]; then
            lane_status="not-applicable"
            failure_class=""
          fi

          normalize_args=(
            --lane-id typescript-api-unit
            --domain typescript-api
            --layer unit
            --status "$lane_status"
            --failure-class "$failure_class"
            --evidence-bundle-path .artifacts/typescript-api
            --output "$GITHUB_WORKSPACE/.artifacts/coverage/typescript-api-unit/coverage-lane-result.json"
          )

          bash "$GITHUB_WORKSPACE/scripts/coverage-normalize-lane-result.sh" "${normalize_args[@]}"

      - name: Ensure TypeScript API artifact path exists
        if: always()
        run: |
          mkdir -p "$GITHUB_WORKSPACE/.artifacts/typescript-api"
          if [[ ! -f "$GITHUB_WORKSPACE/.artifacts/typescript-api/coverage.txt" ]]; then
            echo "TypeScript API coverage output missing due to an earlier stage failure." > "$GITHUB_WORKSPACE/.artifacts/typescript-api/coverage.txt"
          fi

      - name: Add TypeScript API coverage output to GitHub Actions summary
        if: always()
        run: |
          {
            echo "## TypeScript API Test Coverage Output"
            echo
            echo '```text'
            cat "$GITHUB_WORKSPACE/.artifacts/typescript-api/coverage.txt"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload TypeScript API coverage output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typescript-api-coverage-output
          path: .artifacts/typescript-api

      - name: Upload TypeScript API job result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typescript-api-tests-job-result
          path: .artifacts/compose-ci/jobs/typescript-api-tests

  api-parity-governance:
    runs-on: ubuntu-latest
    env:
      BANANA_CI_LANE: api-parity
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare API parity lane scripts
        run: |
          chmod +x scripts/validate-api-parity-governance.sh
          chmod +x scripts/compose-ci-write-lane-result.sh
          chmod +x scripts/compose-ci-write-job-result.sh
          chmod +x scripts/coverage-denominator-policy.sh
          chmod +x scripts/coverage-normalize-lane-result.sh

      - name: Run API parity governance gate
        id: run_api_parity_gate
        run: |
          bash scripts/validate-api-parity-governance.sh --strict

      - name: Write API parity lane result
        if: always()
        run: |
          lane_status="fail"
          if [[ "${{ steps.run_api_parity_gate.outcome }}" == "success" ]]; then
            lane_status="pass"
          fi

          bash scripts/compose-ci-write-lane-result.sh \
            --lane "$BANANA_CI_LANE" \
            --status "$lane_status" \
            --stage parity-gate \
            --reason-code "$( [[ "$lane_status" == "pass" ]] && echo success || echo parity_drift_detected )" \
            --diagnostics-bundle-path .specify/specs/047-api-parity-governance/artifacts \
            --parity-gate-file .specify/specs/047-api-parity-governance/artifacts/parity-gate-result.json

      - name: Emit API parity denominator policy snapshot
        if: always()
        run: |
          bash scripts/coverage-denominator-policy.sh \
            --snapshot-output "$BANANA_COVERAGE_ARTIFACT_ROOT/$BANANA_CI_LANE/denominator-policy.json"

      - name: Normalize API parity lane coverage result
        if: always()
        run: |
          lane_status="fail"
          failure_class="coverage_contract_violation"

          if [[ "${{ steps.run_api_parity_gate.outcome }}" == "success" ]]; then
            lane_status="pass"
            failure_class=""
          fi

          normalize_args=(
            --lane-id "$BANANA_CI_LANE"
            --domain api-parity
            --layer integration
            --status "$lane_status"
            --evidence-bundle-path .specify/specs/047-api-parity-governance/artifacts
            --exceptions-report .specify/specs/047-api-parity-governance/artifacts/parity-exceptions.json
            --output "$BANANA_COVERAGE_ARTIFACT_ROOT/$BANANA_CI_LANE/coverage-lane-result.json"
          )

          if [[ -n "$failure_class" ]]; then
            normalize_args+=(--failure-class "$failure_class")
          fi

          bash scripts/coverage-normalize-lane-result.sh "${normalize_args[@]}"

      - name: Write API parity job result record
        if: always()
        run: |
          job_status="pass"
          stage="parity-gate"
          reason_code="success"
          exit_code="0"

          if [[ "${{ steps.run_api_parity_gate.outcome }}" == "failure" ]]; then
            job_status="fail"
            stage="parity-gate"
            reason_code="parity_drift_detected"
            exit_code="1"
          fi

          bash scripts/compose-ci-write-job-result.sh \
            --job api-parity-governance \
            --status "$job_status" \
            --stage "$stage" \
            --reason-code "$reason_code" \
            --exit-code "$exit_code"

      - name: Add API parity summary
        if: always()
        run: |
          {
            echo "## API Parity Governance Summary"
            echo
            echo "### Gate Result"
            echo
            echo '```json'
            cat .specify/specs/047-api-parity-governance/artifacts/parity-gate-result.json
            echo '```'
            echo
            echo "### Drift Report"
            echo
            echo '```json'
            cat .specify/specs/047-api-parity-governance/artifacts/parity-drift-report.json
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload API parity artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-parity-governance-artifacts
          path: |
            .specify/specs/047-api-parity-governance/artifacts/overlapping-routes.inventory.json
            .specify/specs/047-api-parity-governance/artifacts/parity-drift-report.json
            .specify/specs/047-api-parity-governance/artifacts/parity-exceptions.json
            .specify/specs/047-api-parity-governance/artifacts/parity-gate-result.json

      - name: Upload API parity job result artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-parity-governance-job-result
          path: .artifacts/compose-ci/jobs/api-parity-governance

  compose-tests:
    runs-on: ubuntu-latest
    env:
      BANANA_CI_LANE: compose-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare compose lane scripts
        run: |
          chmod +x scripts/compose-tests.sh
          chmod +x scripts/compose-ci-preflight.sh
          chmod +x scripts/compose-ci-write-lane-result.sh
          chmod +x scripts/coverage-normalize-lane-result.sh
          chmod +x scripts/coverage-denominator-policy.sh
          chmod +x scripts/compose-ci-collect-diagnostics.sh
          chmod +x scripts/compose-ci-artifact-manifest.sh
          chmod +x scripts/validate-compose-ci-lane-contract.sh

      - name: Preflight compose tests lane
        run: |
          bash scripts/compose-ci-preflight.sh \
            --lane "$BANANA_CI_LANE" \
            --profile tests \
            --entry-script scripts/compose-tests.sh

      - name: Run compose tests lane
        id: run_compose_tests
        run: bash scripts/compose-tests.sh

      - name: Write compose tests lane result
        if: always()
        run: |
          lane_status="fail"
          if [[ "${{ steps.run_compose_tests.outcome }}" == "success" ]]; then
            lane_status="pass"
          fi

          bash scripts/compose-ci-write-lane-result.sh \
            --lane "$BANANA_CI_LANE" \
            --status "$lane_status"

      - name: Emit compose tests denominator policy snapshot
        if: always()
        run: |
          bash scripts/coverage-denominator-policy.sh \
            --snapshot-output "$BANANA_COVERAGE_ARTIFACT_ROOT/$BANANA_CI_LANE/denominator-policy.json"

      - name: Normalize compose tests lane coverage result
        if: always()
        run: |
          lane_status="fail"
          exercised_flows=()

          if [[ "${{ steps.run_compose_tests.outcome }}" == "success" ]]; then
            lane_status="pass"
            exercised_flows=(
              --exercised-flow-id api-health
              --exercised-flow-id api-banana
              --exercised-flow-id react-home
              --exercised-flow-id react-search
              --exercised-flow-id react-render
            )
          fi

          bash scripts/coverage-normalize-lane-result.sh \
            --lane-id api-react-e2e \
