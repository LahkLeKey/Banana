name: Orchestrate Autonomous Self-Training Cycle

permissions:
  contents: write
  pull-requests: write

on:
  workflow_dispatch:
    inputs:
      incremental_plan_json:
        description: Optional JSON array (or {"increments": [...]}) describing autonomous incremental slices
        required: false
        default: ""
      wiki_dry_run:
        description: Run wiki synchronization in dry-run mode
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      wiki_push:
        description: Push wiki commits to remote when wiki sync is not dry-run
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      wiki_sync_mapping:
        description: Optional newline-delimited source|target mapping for wiki sync
        required: false
        default: ""
      continue_on_error:
        description: Continue later increments if one increment fails
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  schedule:
    - cron: "30 5,11,17 * * 1-5"
  pull_request_target:
    types:
      - closed

jobs:
  autonomous-self-training:
    if: ${{ github.event_name != 'pull_request_target' || (github.event.pull_request.merged == true && contains(github.event.pull_request.labels.*.name, 'copilot-autonomous-cycle')) }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BANANA_SDLC_ID: autonomous-self-train
      BANANA_SDLC_INCREMENT_PLAN_JSON: >-
        ${{ github.event.inputs.incremental_plan_json || '[{"id":"feedback-corpus","change_command":"python scripts/apply-not-banana-feedback.py --feedback data/not-banana/feedback/inbox.json --corpus data/not-banana/corpus.json --status-filter approved --max-entries 8 --consume --require-human-review --minimum-human-reviewers 1 --report artifacts/not-banana-feedback/sdlc-apply-report.json","commit_message":"chore(feedback): apply approved feedback into corpus","pr_title":"triage(feedback): apply approved inbox updates","pr_body":"Autonomous self-training increment: apply approved not-banana feedback in bounded batches.","labels":"automation,sdlc,triaged-item,copilot-auto-approve,copilot-autonomous-cycle,feedback-loop"},{"id":"training-docs","change_command":"python scripts/train-not-banana-model.py --corpus data/not-banana/corpus.json --output artifacts/not-banana-model --training-profile ci --session-mode single --max-sessions 1 && mkdir -p src/native/core/domain/generated && cp artifacts/not-banana-model/banana_signal_tokens.h src/native/core/domain/generated/banana_signal_tokens.h","commit_message":"chore(model): refresh generated not-banana vocabulary header","pr_title":"triage(model): refresh generated not-banana vocabulary","pr_body":"Autonomous self-training increment: retrain bounded not-banana vocabulary and refresh generated native header.","labels":"automation,sdlc,triaged-item,copilot-auto-approve,copilot-autonomous-cycle,model-training"}]' }}
      BANANA_BASE_BRANCH: main
      BANANA_BRANCH_PREFIX: sdlc
      BANANA_DRAFT_PR: 'false'
      BANANA_PR_LABELS: automation,sdlc,triaged-item,copilot-auto-approve,copilot-autonomous-cycle
      BANANA_PR_REVIEWERS: ''
      BANANA_SDLC_SKIP_NO_CHANGES: 'true'
      BANANA_SDLC_CONTINUE_ON_ERROR: ${{ github.event.inputs.continue_on_error || 'true' }}
      BANANA_SDLC_ENABLE_WIKI_SYNC: 'true'
      BANANA_SDLC_VALIDATE_AI_CONTRACTS: 'true'
      BANANA_WIKI_DRY_RUN: ${{ github.event.inputs.wiki_dry_run || 'false' }}
      BANANA_WIKI_PUSH: ${{ github.event.inputs.wiki_push || 'true' }}
      BANANA_WIKI_STRICT: 'true'
      BANANA_WIKI_COMMIT_MESSAGE: 'docs(wiki): sync autonomous self-training SDLC snapshots'
      BANANA_WIKI_REMOTE_URL: https://github.com/LahkLeKey/Banana.wiki.git
      BANANA_ENFORCE_CANONICAL_WIKI_REMOTE: 'true'
      BANANA_WIKI_SYNC_MAPPING: ${{ github.event.inputs.wiki_sync_mapping || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run bounded autonomous SDLC increments
        run: |
          bash scripts/workflow-orchestrate-sdlc.sh
