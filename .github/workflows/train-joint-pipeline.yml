name: Joint Training Pipeline
on:
  workflow_dispatch:
    inputs:
      training_profile:
        description: "Training profile (ci or local)"
        default: ci
jobs:
  joint-train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt || true
      - run: python scripts/train-joint-pipeline.py --training-profile ${{ inputs.training_profile }} --max-sessions 1
