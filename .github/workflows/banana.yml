name: Banana-Monorepo

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  actions: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: Lint / pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install clang-format
        run: sudo apt-get update -qq && sudo apt-get install -y clang-format-19

      - name: Install pre-commit
        run: python -m pip install pre-commit

      - name: Run pre-commit on PR diff
        if: github.event_name == 'pull_request'
        run: |
          pre-commit run --show-diff-on-failure --color=always \
            --from-ref "${{ github.event.pull_request.base.sha }}" \
            --to-ref "${{ github.event.pull_request.head.sha }}"

      - name: Run pre-commit on all files
        if: github.event_name != 'pull_request'
        run: pre-commit run --show-diff-on-failure --color=always --all-files

  typescript-smoke:
    name: Build / TypeScript smoke
    needs: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install shared UI dependencies
        run: bun install --frozen-lockfile
        working-directory: src/typescript/shared/ui

      - name: UI smoke import
        run: bun -e 'import "./src/typescript/shared/ui/src/types.ts"; console.log("ui-types-ok");'

      - name: Install API dependencies
        run: bun install --frozen-lockfile
        working-directory: src/typescript/api

      - name: API route smoke import
        run: bun -e 'import { registerHealthRoutes } from "./src/typescript/api/src/routes/health.ts"; console.log(typeof registerHealthRoutes);'

      - name: Verify procedural generated assets contract (strict, no native compile)
        run: bun scripts/prepare-procedural-assets.mjs
        working-directory: src/typescript/react
        env:
          BANANA_GENERATED_ASSET_POLICY: strict
          BANANA_GENERATED_ASSET_COMPILE_MODE: skip

  native-build:
    name: Native / build + tests
    needs: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install native build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build gcc g++

      - name: Configure native
        run: cmake -S src/native -B out/native-ci -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build native
        run: cmake --build out/native-ci --parallel

      - name: Run native tests
        run: ctest --test-dir out/native-ci --output-on-failure

  wasm-engine:
    name: Build / wasm engine assets
    needs: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build wasm binaries in Docker
        run: |
          docker run --rm -v "${{ github.workspace }}:/workspace" -w /workspace emscripten/emsdk:3.1.57 \
            bash -lc "bash scripts/build-engine-wasm.sh --release"

      - name: Verify wasm artifacts exist
        run: |
          test -f out/wasm/engine.js
          test -f out/wasm/engine.wasm

  wasm-pentest:
    name: Security / WASM penetration tests
    needs: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install API dependencies
        run: bun install --frozen-lockfile
        working-directory: src/typescript/api

      - name: Run WASM penetration suite
        id: wasm_pentest_run
        run: |
          set -o pipefail
          mkdir -p artifacts/ci/wasm-security
          bun run test:wasm-pentest 2>&1 | tee artifacts/ci/wasm-security/wasm-pentest-output.txt
        working-directory: src/typescript/api

      - name: Generate WASM security report
        if: always()
        shell: bash
        run: |
          mkdir -p artifacts/ci/wasm-security
          OUTPUT_FILE="artifacts/ci/wasm-security/wasm-pentest-output.txt"
          REPORT_FILE="artifacts/ci/wasm-security/wasm-pentest-report.md"

          passed_tests=$(grep -Eo '[0-9]+ pass' "$OUTPUT_FILE" | awk '{sum+=$1} END {print sum+0}')
          failed_tests=$(grep -Eo '[0-9]+ fail' "$OUTPUT_FILE" | awk '{sum+=$1} END {print sum+0}')

          {
            echo "# WASM Security Report"
            echo
            echo "- Workflow: ${{ github.workflow }}"
            echo "- Run ID: ${{ github.run_id }}"
            echo "- Ref: ${{ github.ref }}"
            echo "- Commit: ${{ github.sha }}"
            echo "- Job Result: ${{ steps.wasm_pentest_run.outcome }}"
            echo "- Passed Tests: ${passed_tests}"
            echo "- Failed Tests: ${failed_tests}"
            echo
            echo "## Test Command"
            echo
            echo "\`bun run test:wasm-pentest\`"
            echo
            echo "## Raw Output"
            echo
            echo '```text'
            cat "$OUTPUT_FILE"
            echo '```'
          } > "$REPORT_FILE"

      - name: Upload WASM security artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wasm-security-report-${{ github.run_id }}
          path: artifacts/ci/wasm-security
          if-no-files-found: error

  monorepo-pass-fail:
    name: Monorepo / Pass-Fail
    needs:
      - pre-commit
      - typescript-smoke
      - native-build
      - wasm-engine
      - wasm-pentest
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Publish monorepo summary
        run: |
          {
            echo "## Monorepo Summary"
            echo
            echo "| Lane | Result |"
            echo "| --- | --- |"
            echo "| Lint / pre-commit | ${{ needs.pre-commit.result }} |"
            echo "| Build / TypeScript smoke | ${{ needs.typescript-smoke.result }} |"
            echo "| Native / build + tests | ${{ needs.native-build.result }} |"
            echo "| Build / wasm engine assets | ${{ needs.wasm-engine.result }} |"
            echo "| Security / WASM penetration tests | ${{ needs.wasm-pentest.result }} |"
            echo
            echo "Removed stale lanes after reset: analytics scan, turbo monorepo lint matrix, legacy native preset matrix, sanitizer/coverage hard gates, architecture governance, compose/runtime smoke, and web vitals budget."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Verify all upstream jobs succeeded
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            exit 1
          fi
