name: Banana-Monorepo

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  actions: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  BANANA_PG_CONNECTION: ${{ secrets.BANANA_PG_CONNECTION }}

jobs:
  pre-commit:
    name: Lint / pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Enforce coherent-world unified-slice guard
        shell: bash
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_SHA: ${{ github.sha }}
        run: bash scripts/validate-coherent-world-unified-slice.sh

      - name: Sanity check database alias helper
        shell: bash
        run: |
          set -euo pipefail
          source scripts/lib/database-env-aliases.sh

          (
            export NEON_DATABASE_URL="postgres://neon-priority@host:5432/banana"
            export DATABASE_URL="postgres://fallback@host:5432/banana"
            export BANANA_PG_CONNECTION="postgres://legacy@host:5432/banana"
            banana_sync_database_aliases
            [[ "${NEON_DATABASE_URL}" == "postgres://neon-priority@host:5432/banana" ]]
            [[ "${DATABASE_URL}" == "${NEON_DATABASE_URL}" ]]
            [[ "${BANANA_PG_CONNECTION}" == "${NEON_DATABASE_URL}" ]]
          )

          (
            unset NEON_DATABASE_URL BANANA_PG_CONNECTION
            export DATABASE_URL="postgres://database-url-fallback@host:5432/banana"
            banana_sync_database_aliases
            [[ "${NEON_DATABASE_URL}" == "${DATABASE_URL}" ]]
            [[ "${BANANA_PG_CONNECTION}" == "${DATABASE_URL}" ]]
          )

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install clang-format
        run: sudo apt-get update -qq && sudo apt-get install -y clang-format-19

      - name: Install pre-commit
        run: python -m pip install pre-commit

      - name: Run pre-commit on PR diff
        if: github.event_name == 'pull_request'
        run: |
          pre-commit run --show-diff-on-failure --color=always \
            --from-ref "${{ github.event.pull_request.base.sha }}" \
            --to-ref "${{ github.event.pull_request.head.sha }}"

      - name: Run pre-commit on all files
        if: github.event_name != 'pull_request'
        run: pre-commit run --show-diff-on-failure --color=always --all-files

  secret-scans:
    name: Security / secret scans
    needs: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}

  typescript-smoke:
    name: Build / TypeScript smoke
    needs: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Normalize Neon database env aliases
        shell: bash
        run: |
          set -euo pipefail
          source scripts/lib/database-env-aliases.sh
          if ! banana_sync_database_aliases; then
            echo "[db-env] no database url provided; leaving aliases empty"
            exit 0
          fi

          echo "::add-mask::${NEON_DATABASE_URL}"
          {
            echo "NEON_DATABASE_URL=${NEON_DATABASE_URL}"
            echo "DATABASE_URL=${DATABASE_URL}"
            echo "BANANA_PG_CONNECTION=${BANANA_PG_CONNECTION}"
          } >> "$GITHUB_ENV"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install shared UI dependencies
        run: bun install --frozen-lockfile
        working-directory: src/typescript/shared/ui

      - name: UI smoke import
        run: bun -e 'import "./src/typescript/shared/ui/src/index.ts"; console.log("ui-types-ok");'

      - name: Install API dependencies
        run: bun install --frozen-lockfile
        working-directory: src/typescript/api

      - name: API route smoke import
        run: bun -e 'import { registerHealthRoutes } from "./src/typescript/api/src/routes/health.ts"; console.log(typeof registerHealthRoutes);'

      - name: API strict contract drift gate
        run: bash scripts/validate-api-parity-governance.sh --strict

      - name: API source-of-record runtime gate
        run: bun test src/services/databaseRuntime.source-of-record.test.ts
        working-directory: src/typescript/api

      - name: Verify procedural generated assets contract (strict, no native compile)
        run: bun scripts/prepare-procedural-assets.mjs
        working-directory: src/typescript/react
        env:
          BANANA_GENERATED_ASSET_POLICY: strict
          BANANA_GENERATED_ASSET_COMPILE_MODE: skip

  native-build:
    name: Native / build + tests
    needs: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Normalize Neon database env aliases
        shell: bash
        run: |
          set -euo pipefail
          source scripts/lib/database-env-aliases.sh
          if ! banana_sync_database_aliases; then
            echo "[db-env] no database url provided; leaving aliases empty"
            exit 0
          fi

          echo "::add-mask::${NEON_DATABASE_URL}"
          {
            echo "NEON_DATABASE_URL=${NEON_DATABASE_URL}"
            echo "DATABASE_URL=${DATABASE_URL}"
            echo "BANANA_PG_CONNECTION=${BANANA_PG_CONNECTION}"
          } >> "$GITHUB_ENV"

      - name: Install native build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build gcc g++

      - name: Configure native
        run: cmake -S src/native -B out/native-ci -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build native
        run: cmake --build out/native-ci --parallel

      - name: Run native tests
        run: ctest --test-dir out/native-ci --output-on-failure

  native-coverage:
    name: Native / coverage
    needs: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install native coverage deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build gcc g++ libomp-dev gcovr lcov

      - name: Run native coverage workflow
        id: native_coverage
        continue-on-error: true
        run: bash scripts/run-native-coverage.sh --build-dir out/native-coverage-ci --output-dir artifacts/native/coverage-ci

      - name: Report native inventory coverage
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import re
          html_path = Path('artifacts/native/coverage-ci/coverage-files-summary.html')
          md_path = Path('artifacts/native/coverage-ci/coverage-summary.md')
          if not html_path.exists():
              print('::warning::Native inventory coverage summary page was not generated.')
              raise SystemExit(0)
          text = html_path.read_text(encoding='utf-8', errors='ignore')
          match = re.search(r'Overall coverage across the current inventory: <strong>([0-9.]+)%</strong>', text)
          if match:
              pct = match.group(1)
              print(f"::notice::Native source inventory coverage: {pct}%")
              with open(os.environ['GITHUB_STEP_SUMMARY'], 'a', encoding='utf-8') as fh:
                  fh.write(f"## Native source inventory coverage\n\n- Overall inventory coverage: {pct}%\n- Report: [coverage-files-summary.html](artifacts/native/coverage-ci/coverage-files-summary.html)\n- Detailed report: [index.html](artifacts/native/coverage-ci/index.html)\n")
          else:
              print('::warning::Native inventory coverage summary page did not contain an overall percentage.')
          if md_path.exists():
              with open(os.environ['GITHUB_STEP_SUMMARY'], 'a', encoding='utf-8') as fh:
                  fh.write('\n### Coverage run note\n\n')
                  fh.write(md_path.read_text(encoding='utf-8'))
          PY

      - name: Upload native coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-coverage-report
          path: artifacts/native/coverage-ci
          if-no-files-found: warn

  native-neon-integration:
    name: Native / Neon integration
    needs:
      - pre-commit
      - native-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install native build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build gcc g++

      - name: Determine Neon integration eligibility
        id: neon_gate
        shell: bash
        run: |
          if [[ -n "${NEON_DATABASE_URL:-}" || -n "${DATABASE_URL:-}" || -n "${BANANA_PG_CONNECTION:-}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "[native-neon-integration] database env detected; executing integration lane"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "[native-neon-integration] skipping integration lane because no DB URL secret is configured"
          fi

      - name: Run native-to-Neon integration lane
        if: ${{ steps.neon_gate.outputs.enabled == 'true' }}
        shell: bash
        run: bash scripts/run-native-neon-integration.sh

      - name: Native-to-Neon lane skipped
        if: ${{ steps.neon_gate.outputs.enabled != 'true' }}
        run: echo "native neon integration skipped (no db secrets configured)"

  monorepo-pass-fail:
    name: Monorepo / Pass-Fail
    needs:
      - pre-commit
      - secret-scans
      - typescript-smoke
      - native-build
      - native-coverage
      - native-neon-integration
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Publish monorepo summary
        run: |
          {
            echo "## Monorepo Summary"
            echo
            echo "| Lane | Result |"
            echo "| --- | --- |"
            echo "| Lint / pre-commit | ${{ needs.pre-commit.result }} |"
            echo "| Security / secret scans | ${{ needs.secret-scans.result }} |"
            echo "| Build / TypeScript smoke | ${{ needs.typescript-smoke.result }} |"
            echo "| Native / build + tests | ${{ needs.native-build.result }} |"
            echo "| Native / Neon integration | ${{ needs.native-neon-integration.result }} |"
            echo
            echo "Removed stale lanes after reset: analytics scan, turbo monorepo lint matrix, legacy native preset matrix, sanitizer/coverage hard gates, architecture governance, compose/runtime smoke, and web vitals budget."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Verify all upstream jobs succeeded
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            exit 1
          fi
