name: Storybook Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - "src/typescript/react/**"

# Allow only one concurrent deploy, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: src/typescript/react
        run: bun install

      - name: Build Storybook
        working-directory: src/typescript/react
        run: bun run build-storybook

      - name: Upload Storybook artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/typescript/react/storybook-static

      - name: Upload PR preview artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: storybook-preview-pr-${{ github.event.pull_request.number }}
          path: src/typescript/react/storybook-static
          retention-days: 7

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  comment-pr-preview:
    if: github.event_name == 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment Storybook preview link
        uses: actions/github-script@v7
        with:
          script: |
            const run_url = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const artifact_url = `${run_url}#artifacts`;
            const body = [
              '## Storybook Preview',
              '',
              `A Storybook build for this PR is available as a [downloadable artifact](${artifact_url}).`,
              '',
              `Artifact name: \`storybook-preview-pr-${context.payload.pull_request.number}\``,
              '',
              '_Download the artifact, unzip it, and open `index.html` in your browser to preview changes locally._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });

            const existing = comments.find(c => c.body.includes('## Storybook Preview'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }
