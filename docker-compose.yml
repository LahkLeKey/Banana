name: banana-container

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: cinterop
      POSTGRES_PASSWORD: cinterop
      POSTGRES_DB: cinterop
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinterop -d cinterop"]
      interval: 5s
      timeout: 3s
      retries: 20
    profiles: ["runtime", "tests", "electron", "apps", "all", "api-fastify"]

  native-build:
    build:
      context: .
      dockerfile: docker/native-builder.Dockerfile
    command: ["bash", "-lc", "mkdir -p /artifacts && cp -f /workspace/out/native/bin/libbanana_native.so /artifacts/libbanana_native.so && ls -l /artifacts"]
    volumes:
      - native-artifacts:/artifacts
    profiles: ["runtime", "tests", "all", "electron", "apps", "api-fastify"]

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    depends_on:
      native-build:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      BANANA_NATIVE_PATH: /native
      BANANA_PG_CONNECTION: host=postgres port=5432 user=cinterop password=cinterop dbname=cinterop
    ports:
      - "8080:8080"
    volumes:
      - native-artifacts:/native:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    profiles: ["runtime", "electron", "apps", "all", "api-fastify"]

  api-fastify:
    build:
      context: .
      dockerfile: docker/api-fastify.Dockerfile
    depends_on:
      api:
        condition: service_healthy
      native-build:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    environment:
      BANANA_API_HOST: 0.0.0.0
      BANANA_API_PORT: 8180
      BANANA_BANANA_DOMAIN_MODE: native
      BANANA_NATIVE_PATH: /native
      BANANA_LEGACY_API_BASE_URL: http://api:8080
      BANANA_LEGACY_ML_API_BASE_URL: http://api:8080
      DATABASE_URL: postgresql://cinterop:cinterop@postgres:5432/cinterop
    ports:
      - "8180:8180"
    volumes:
      - native-artifacts:/native:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8180/health >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    profiles: ["api-fastify"]

  test-unit:
    build:
      context: .
      dockerfile: docker/tests.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      BANANA_PG_CONNECTION: host=postgres port=5432 user=cinterop password=cinterop dbname=cinterop
    command: ["bash", "-lc", "dotnet test tests/unit/CInteropSharp.UnitTests.csproj -c Release --collect:\"XPlat Code Coverage\""]
    profiles: ["tests", "all"]

  test-integration:
    build:
      context: .
      dockerfile: docker/tests.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      BANANA_NATIVE_PATH: /workspace/build/native/bin
      BANANA_PG_CONNECTION: host=postgres port=5432 user=cinterop password=cinterop dbname=cinterop
    command: ["bash", "-lc", "dotnet test tests/integration/CInteropSharp.IntegrationTests.csproj -c Release --collect:\"XPlat Code Coverage\""]
    profiles: ["tests", "all"]

  test-all:
    build:
      context: .
      dockerfile: docker/tests.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      BANANA_NATIVE_PATH: /workspace/build/native/bin
      BANANA_PG_CONNECTION: host=postgres port=5432 user=cinterop password=cinterop dbname=cinterop
    volumes:
      - ./artifacts:/artifacts
    command: ["bash", "-lc", "/workspace/scripts/run-tests-with-coverage.sh"]
    profiles: ["tests", "all"]

  electron-example:
    build:
      context: .
      dockerfile: docker/electron.Dockerfile
    depends_on:
      api:
        condition: service_healthy
      native-build:
        condition: service_completed_successfully
    environment:
      BANANA_API_URL: http://api:8080
      BANANA_NATIVE_PATH: /native
    command: ["npm", "run", "smoke"]
    volumes:
      - native-artifacts:/native:ro
    profiles: ["electron", "all"]

  electron-desktop:
    build:
      context: .
      dockerfile: docker/electron.Dockerfile
    depends_on:
      api:
        condition: service_healthy
      native-build:
        condition: service_completed_successfully
      react-app:
        condition: service_started
    environment:
      BANANA_API_URL: http://api:8080
      BANANA_NATIVE_PATH: /native
      BANANA_ELECTRON_RENDERER_URL: http://react-app:5173
      DISPLAY: ${DISPLAY:-:0}
      WAYLAND_DISPLAY: ${WAYLAND_DISPLAY:-wayland-0}
      XDG_RUNTIME_DIR: ${XDG_RUNTIME_DIR:-/mnt/wslg/runtime-dir}
      PULSE_SERVER: ${PULSE_SERVER:-/mnt/wslg/PulseServer}
      LIBGL_ALWAYS_SOFTWARE: ${LIBGL_ALWAYS_SOFTWARE:-1}
      ELECTRON_DISABLE_SANDBOX: "1"
      ELECTRON_ENABLE_LOGGING: "1"
    command: ["bash", "-lc", "bash ./run-desktop.sh"]
    volumes:
      - native-artifacts:/native:ro
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /mnt/wslg:/mnt/wslg
    shm_size: "1gb"
    profiles: ["electron-desktop"]

  react-app:
    build:
      context: .
      dockerfile: docker/react.Dockerfile
    depends_on:
      api:
        condition: service_healthy
    environment:
      VITE_BANANA_API_BASE_URL: http://api:8080
    ports:
      - "5173:5173"
    profiles: ["apps", "all"]

  react-native-web:
    build:
      context: .
      dockerfile: docker/react-native.Dockerfile
    depends_on:
      api:
        condition: service_healthy
    environment:
      EXPO_PUBLIC_BANANA_API_BASE_URL: http://localhost:8080
    ports:
      - "19006:8081"
    profiles: ["apps", "all"]

  android-emulator:
    image: budtmo/docker-android:emulator_14.0
    depends_on:
      react-native-web:
        condition: service_started
    environment:
      DEVICE: "Samsung Galaxy S10"
      APPIUM: "false"
      WEB_VNC: "true"
      EMULATOR_ARGS: "-gpu swiftshader_indirect -no-snapshot-save -no-boot-anim"
    privileged: true
    shm_size: "2gb"
    ports:
      - "6080:6080"
      - "5554:5554"
      - "5555:5555"
    profiles: ["android-emulator"]

volumes:
  native-artifacts:
