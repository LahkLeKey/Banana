services:
  banana-postgres:
    build:
      context: .
      dockerfile: docker/postgres-pg-durable.Dockerfile
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: banana
      POSTGRES_DB: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - banana-postgres-data:/var/lib/postgresql/data

  native-neon-integration:
    image: oven/bun:1.2
    working_dir: /workspace
    command:
      - bash
      - -lc
      - apt-get update -qq && apt-get install -y --no-install-recommends cmake ninja-build gcc g++ && sed -i 's/\r$//' /workspace/scripts/lib/database-env-aliases.sh /workspace/scripts/run-native-neon-integration.sh && bash /workspace/scripts/run-native-neon-integration.sh
    environment:
      NEON_DATABASE_URL: ${NEON_DATABASE_URL:-postgres://postgres:banana@banana-postgres:5432/postgres}
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:banana@banana-postgres:5432/postgres}
      BANANA_PG_CONNECTION: ${BANANA_PG_CONNECTION:-postgres://postgres:banana@banana-postgres:5432/postgres}
      BANANA_NEON_TEST_RETRY_ATTEMPTS: ${BANANA_NEON_TEST_RETRY_ATTEMPTS:-}
      BANANA_NEON_TEST_RETRY_DELAY_MS: ${BANANA_NEON_TEST_RETRY_DELAY_MS:-}
      BANANA_NEON_CONNECT_TIMEOUT_MS: ${BANANA_NEON_CONNECT_TIMEOUT_MS:-}
      BANANA_NATIVE_NEON_BUILD_DIR: /workspace/out/native-neon-integration
    depends_on:
      banana-postgres:
        condition: service_healthy
    volumes:
      - .:/workspace

  api-overworld:
    build:
      context: .
      dockerfile: docker/api-overworld.Dockerfile
    working_dir: /workspace/src/typescript/api
    command:
      - sh
      - -lc
      - sed -i 's/\r$//' /workspace/scripts/ensure-native-linux-artifact.sh && sh /workspace/scripts/ensure-native-linux-artifact.sh && (test -d node_modules || bun install) && bun run dev
    environment:
      HOST: 0.0.0.0
      PORT: "8081"
      BANANA_ENGINE_ADAPTER: inmemory
      BANANA_ANTICHEAT_ADAPTER: inmemory
      BANANA_TRAINING_STORE_MODE: inmemory
      BANANA_NATIVE_PATH: /workspace/out/native/bin/libbanana_native.so
      BANANA_NATIVE_BOOTSTRAP_REQUIRED: "1"
      NEON_DATABASE_URL: ${NEON_DATABASE_URL:-postgres://postgres:banana@banana-postgres:5432/postgres}
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:banana@banana-postgres:5432/postgres}
      BANANA_PG_CONNECTION: ${BANANA_PG_CONNECTION:-postgres://postgres:banana@banana-postgres:5432/postgres}
      BANANA_CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8081:8081"
    depends_on:
      banana-postgres:
        condition: service_healthy
    volumes:
      - .:/workspace

  react-overworld:
    image: oven/bun:1.3
    working_dir: /workspace/src/typescript/react
    command:
      - sh
      - -lc
      - bun install --cwd /workspace/src/typescript/shared/ui && bun run --cwd /workspace/src/typescript/shared/ui tokens:gen && bun install && bun run dev --host 0.0.0.0 --port 5173
    environment:
      VITE_BANANA_API_BASE_URL: http://localhost:8081
    depends_on:
      - api-overworld
    ports:
      - "5173:5173"
    volumes:
      - .:/workspace

  keycloak-postgres:
    image: postgres:17
    profiles:
      - keycloak-local
    environment:
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
      POSTGRES_DB: keycloak
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5433:5432"
    volumes:
      - keycloak-postgres-data:/var/lib/postgresql/data

  keycloak-local:
    build:
      context: .
      dockerfile: docker/keycloak.Dockerfile
    profiles:
      - keycloak-local
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-zephrym}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-4xcruvfg989}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KC_HOSTNAME_STRICT: "false"
      BANANA_KEYCLOAK_IDP_GITHUB_CLIENT_ID: ${BANANA_KEYCLOAK_IDP_GITHUB_CLIENT_ID:-}
      BANANA_KEYCLOAK_IDP_GITHUB_CLIENT_SECRET: ${BANANA_KEYCLOAK_IDP_GITHUB_CLIENT_SECRET:-}
      BANANA_KEYCLOAK_IDP_GOOGLE_CLIENT_ID: ${BANANA_KEYCLOAK_IDP_GOOGLE_CLIENT_ID:-}
      BANANA_KEYCLOAK_IDP_GOOGLE_CLIENT_SECRET: ${BANANA_KEYCLOAK_IDP_GOOGLE_CLIENT_SECRET:-}
      BANANA_KEYCLOAK_IDP_LINKEDIN_CLIENT_ID: ${BANANA_KEYCLOAK_IDP_LINKEDIN_CLIENT_ID:-}
      BANANA_KEYCLOAK_IDP_LINKEDIN_CLIENT_SECRET: ${BANANA_KEYCLOAK_IDP_LINKEDIN_CLIENT_SECRET:-}
      BANANA_KEYCLOAK_IDP_LINKEDIN_AUTH_URL: ${BANANA_KEYCLOAK_IDP_LINKEDIN_AUTH_URL:-https://www.linkedin.com/oauth/v2/authorization}
      BANANA_KEYCLOAK_IDP_LINKEDIN_TOKEN_URL: ${BANANA_KEYCLOAK_IDP_LINKEDIN_TOKEN_URL:-https://www.linkedin.com/oauth/v2/accessToken}
      BANANA_KEYCLOAK_IDP_LINKEDIN_USERINFO_URL: ${BANANA_KEYCLOAK_IDP_LINKEDIN_USERINFO_URL:-https://api.linkedin.com/v2/userinfo}
      BANANA_KEYCLOAK_IDP_LINKEDIN_JWKS_URL: ${BANANA_KEYCLOAK_IDP_LINKEDIN_JWKS_URL:-https://www.linkedin.com/oauth/openid/jwks}
      BANANA_KEYCLOAK_IDP_LINKEDIN_ISSUER: ${BANANA_KEYCLOAK_IDP_LINKEDIN_ISSUER:-https://www.linkedin.com}
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  banana-postgres-data:
  keycloak-postgres-data:
