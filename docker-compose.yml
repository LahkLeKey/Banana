services:
  banana-postgres:
    build:
      context: .
      dockerfile: docker/postgres-pg-durable.Dockerfile
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: banana
      POSTGRES_DB: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - banana-postgres-data:/var/lib/postgresql/data

  native-neon-integration:
    image: oven/bun:1.2
    working_dir: /workspace
    command:
      - bash
      - -lc
      - apt-get update -qq && apt-get install -y --no-install-recommends cmake ninja-build gcc g++ && sed -i 's/\r$//' /workspace/scripts/lib/database-env-aliases.sh /workspace/scripts/run-native-neon-integration.sh && bash /workspace/scripts/run-native-neon-integration.sh
    environment:
      NEON_DATABASE_URL: ${NEON_DATABASE_URL:-postgres://postgres:banana@banana-postgres:5432/postgres}
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:banana@banana-postgres:5432/postgres}
      BANANA_PG_CONNECTION: ${BANANA_PG_CONNECTION:-postgres://postgres:banana@banana-postgres:5432/postgres}
      BANANA_NEON_TEST_RETRY_ATTEMPTS: ${BANANA_NEON_TEST_RETRY_ATTEMPTS:-}
      BANANA_NEON_TEST_RETRY_DELAY_MS: ${BANANA_NEON_TEST_RETRY_DELAY_MS:-}
      BANANA_NEON_CONNECT_TIMEOUT_MS: ${BANANA_NEON_CONNECT_TIMEOUT_MS:-}
      BANANA_NATIVE_NEON_BUILD_DIR: /workspace/out/native-neon-integration
    depends_on:
      banana-postgres:
        condition: service_healthy
    volumes:
      - .:/workspace

  api-overworld:
    build:
      context: .
      dockerfile: docker/api-overworld.Dockerfile
    working_dir: /workspace/src/typescript/api
    command:
      - sh
      - -lc
      - sed -i 's/\r$//' /workspace/scripts/ensure-native-linux-artifact.sh && sh /workspace/scripts/ensure-native-linux-artifact.sh && (test -d node_modules || bun install) && bun run dev
    environment:
      HOST: 0.0.0.0
      PORT: "8081"
      BANANA_ENGINE_ADAPTER: inmemory
      BANANA_ANTICHEAT_ADAPTER: inmemory
      BANANA_TRAINING_STORE_MODE: inmemory
      BANANA_NATIVE_PATH: /workspace/out/native/bin/libbanana_native.so
      BANANA_NATIVE_BOOTSTRAP_REQUIRED: "1"
      NEON_DATABASE_URL: ${NEON_DATABASE_URL:-postgres://postgres:banana@banana-postgres:5432/postgres}
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:banana@banana-postgres:5432/postgres}
      BANANA_PG_CONNECTION: ${BANANA_PG_CONNECTION:-postgres://postgres:banana@banana-postgres:5432/postgres}
      BANANA_CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://localhost:3000,http://127.0.0.1:3000
      BANANA_JWT_SECRET: banana-local-jwt-secret
      BANANA_KEYCLOAK_CLIENT_ID: banana-react-spa
      BANANA_KEYCLOAK_ISSUER_URL: https://banana-keycloak-dev.fly.dev/realms/banana
      BANANA_KEYCLOAK_TOKEN_ISSUER_URL: https://banana-keycloak-dev.fly.dev/realms/banana
    ports:
      - "8081:8081"
    depends_on:
      banana-postgres:
        condition: service_healthy
    volumes:
      - .:/workspace

  react-overworld:
    image: oven/bun:1.3
    working_dir: /workspace/src/typescript/react
    command:
      - sh
      - -lc
      - bun install --cwd /workspace/src/typescript/shared/ui && bun run --cwd /workspace/src/typescript/shared/ui tokens:gen && bun install && bun run dev --host 0.0.0.0 --port 5173
    environment:
      VITE_BANANA_API_BASE_URL: http://localhost:8081
    depends_on:
      - api-overworld
    ports:
      - "5173:5173"
    volumes:
      - .:/workspace

volumes:
  banana-postgres-data:
