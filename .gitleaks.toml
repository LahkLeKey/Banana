title = "Banana secret scan allowlist"

[[rules]]
id = "hardcoded-password-default-shell"
description = "Flags shell env expansions that set a literal fallback for password variables"
regex = '''(?i)\b[A-Z0-9_]*PASSWORD\b\s*=\s*"\$\{[A-Z0-9_]+:-[^}\"$][^}\"]*\}"'''
tags = ["password", "hardcoded", "shell"]

[[rules]]
id = "hardcoded-password-default-compose"
description = "Flags docker-compose style literal defaults for password variables"
regex = '''(?i)\b[A-Z0-9_]*PASSWORD\b\s*:\s*\$\{[A-Z0-9_]+:-[^}\"$][^}]*\}'''
tags = ["password", "hardcoded", "compose"]

[allowlist]
description = "Documented placeholders used in runbooks and examples"
commits = [
  '''fee803c851a37ca7a06b338ec052466e34a562b5'''
]
paths = [
  '''docs/under-20-fly-only-postgres-runbook.md''',
  '''docs/cost-effective-under-20-db-plan.md''',
  '''docs/under-20-hetzner-postgres-runbook.md'''
]
