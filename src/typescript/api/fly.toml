app = "banana-api"
primary_region = "iad"
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  dockerfile = "Dockerfile"

[env]
  HOST = "0.0.0.0"
  PORT = "8081"
  BANANA_NATIVE_PATH = "/app/src/typescript/api/libbanana_native.so"
  BANANA_ENGINE_ADAPTER = "inmemory"
  BANANA_ANTICHEAT_ADAPTER = "inmemory"
  BANANA_KEYCLOAK_ISSUER_URL = "https://banana-keycloak-prod.fly.dev/realms/banana"
  BANANA_KEYCLOAK_TOKEN_ISSUER_URL = "https://banana-keycloak-prod.fly.dev/realms/banana"
  BANANA_KEYCLOAK_CLIENT_ID = "banana-react-spa"
  BANANA_CORS_ORIGINS = "https://banana.engineer,https://www.banana.engineer,https://*.vercel.app,http://localhost:5173,http://127.0.0.1:5173"
  NODE_ENV = "production"
  BANANA_NEON_STRICT = "true"

[http_service]
  internal_port = 8081
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[http_service.checks]]
    interval = "15s"
    timeout = "2s"
    method = "get"
    path = "/health"
    protocol = "http"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"